<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VJ FX Maker</title>
<style>
* { box-sizing: border-box; }
:root {
  --left-w: 280px;
  --right-w: 330px;
  --bottom-h: 210px;
  --track-offset: 232px;
  --panel: #232323;
  --panel-2: #2a2a2a;
  --line: #3a3a3a;
  --line-soft: #1b1b1b;
  --text: #e7e8ea;
  --muted: #8a92a3;
  --accent: #1f8bd8;
  --green: #88d8a3;
  --gold: #d8c188;
}
html, body { margin: 0; padding: 0; height: 100%; background: #090a0d; color: var(--text);
  font: 12px/1.4 system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
  overflow: hidden; }
button, input, select { font: inherit; color: inherit; }
button { background: #1e2229; border: 1px solid var(--line); padding: 5px 9px; border-radius: 4px; cursor: pointer; transition: background .1s, border-color .1s; white-space: nowrap; }
button:hover { background: #282d36; border-color: #3a4150; }
button:active { background: #303641; }
button.primary { background: #2c3554; border-color: #4a5b8a; }
button.primary:hover { background: #34406b; }
button.danger { background: #4a2c2c; border-color: #8a4a4a; }
button.toggle-on { background: #253a30; border-color: #3f7c58; color: #b8f0c8; }
input[type=text], input[type=number] { background: #101218; border: 1px solid var(--line); padding: 3px 6px; border-radius: 3px; color: var(--text); }
input[type=number] { width: 68px; }
input[type=range] { width: 100%; accent-color: var(--accent); }
input[type=color] { width: 28px; height: 22px; padding: 0; border: 1px solid var(--line); background: #101218; cursor: pointer; }
input[type=file] { font-size: 11px; max-width: 100%; }
select { background: #101218; border: 1px solid var(--line); padding: 3px 6px; border-radius: 3px; }

#app {
  display: grid;
  grid-template-columns: var(--left-w) 6px minmax(0, 1fr) 6px var(--right-w);
  grid-template-rows: 68px minmax(0, 1fr) 6px var(--bottom-h);
  grid-template-areas:
    "top top top top top"
    "left resizeL center resizeR right"
    "resizeB resizeB resizeB resizeB resizeB"
    "bottom bottom bottom bottom bottom";
  height: 100vh;
  min-width: 780px;
}
#app.fs {
  grid-template-columns: 1fr;
  grid-template-rows: 1fr;
  grid-template-areas: "center";
}
#app.fs #topbar, #app.fs #left, #app.fs #right, #app.fs #bottom, #app.fs .panel-resizer { display: none; }

#topbar { grid-area: top; display: flex; flex-direction: column; gap: 0; background: #1e1e1e; border-bottom: 1px solid #050505; min-width: 0; overflow: hidden; }
.menu-row, .tool-row { display: flex; align-items: center; min-width: 0; }
.menu-row { height: 27px; gap: 8px; padding: 2px 8px; background: #1b1b1b; border-bottom: 1px solid #080808; }
.tool-row { height: 41px; gap: 6px; padding: 4px 8px; background: #252525; box-shadow: inset 0 1px #333; overflow-x: auto; }
.brand { font-weight: 700; letter-spacing: .02em; color: #d6d6d6; flex: 0 0 auto; padding-right: 8px; border-right: 1px solid #383838; }
.menu-button, .tool-btn { background: transparent; border: 1px solid transparent; border-radius: 2px; padding: 3px 7px; color: #c8c8c8; }
.menu-button:hover, .tool-btn:hover { background: #303030; border-color: #454545; }
.tool-btn.icon { width: 30px; height: 28px; padding: 0; font-size: 15px; display: inline-flex; align-items: center; justify-content: center; }
.workspace-tabs { display: flex; align-items: center; gap: 2px; margin-left: auto; color: #aaa; }
.workspace-tabs span { padding: 3px 10px; border-left: 1px solid transparent; border-right: 1px solid transparent; }
.workspace-tabs .active { color: #5fb6ff; border-color: #3a3a3a; background: #242424; }
.top-group { display: flex; align-items: center; gap: 5px; min-width: 0; border-right: 1px solid #3a3a3a; padding-right: 6px; }
.top-group.grow { flex: 1 1 auto; }
.top-group.transport button { min-width: 34px; }
.top-label { color: var(--muted); font-size: 10px; text-transform: uppercase; }
#timecode { font: 12px/1.2 ui-monospace, Consolas, monospace; color: #cbd3e2; min-width: 66px; text-align: right; }
#topbar input[type=range] { width: 90px; }
#topEffectSelect { width: 150px; }

#left, #right, #bottom { background: var(--panel); overflow: hidden; min-width: 0; min-height: 0; }
#left { grid-area: left; border-right: 1px solid #050505; display: flex; flex-direction: column; }
#right { grid-area: right; border-left: 1px solid #050505; display: flex; flex-direction: column; }
#bottom { grid-area: bottom; border-top: 1px solid var(--line-soft); display: flex; flex-direction: column; }
.panel-scroll { overflow: auto; padding: 10px; min-height: 0; }
.panel-head { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 1px solid #101010; background: #2b2b2b; min-height: 30px; box-shadow: inset 0 1px #3a3a3a; }
.panel-title { font-size: 11px; color: #c6c6c6; font-weight: 650; flex: 1; }
.right-stack { overflow: auto; min-height: 0; flex: 1; }
.side-panel { border-bottom: 1px solid #111; background: #242424; }
.side-panel summary { list-style: none; cursor: pointer; padding: 7px 10px; background: #2b2b2b; border-top: 1px solid #373737; border-bottom: 1px solid #171717; color: #c9c9c9; font-weight: 650; }
.side-panel summary::-webkit-details-marker { display: none; }
.side-panel summary::before { content: "▸"; color: #8a8a8a; margin-right: 6px; }
.side-panel[open] summary::before { content: "▾"; }
.side-panel-body { padding: 8px 10px; color: #aeb6c5; }
.side-kv { display: grid; grid-template-columns: 70px 1fr; gap: 2px 8px; font: 11px/1.5 ui-monospace, Consolas, monospace; }
.side-kv span:nth-child(odd) { color: #858585; }
.side-panel .toolbar { margin-top: 4px; }

#center { grid-area: center; display: flex; flex-direction: column; align-items: stretch; justify-content: center;
  background: #222; position: relative; min-width: 0; min-height: 0; padding: 8px 8px 0; border-top: 1px solid #343434; }
#viewWrap { flex: 1 1 auto; }
#previewControls { flex: 0 0 auto; display: flex; align-items: center; gap: 4px; padding: 6px 8px; background: #1c1e22; border: 1px solid #2a2e36; border-radius: 4px; margin-top: 6px; }
#previewControls .pc-btn { background: #232830; border: 1px solid #303743; color: #c8c8c8; padding: 3px 9px; font-size: 13px; min-width: 30px; line-height: 1.1; border-radius: 3px; cursor: pointer; }
#previewControls .pc-btn:hover { background: #2c333d; border-color: #3a4252; }
#previewControls .pc-btn.pc-play.playing { background: #2c4f3a; border-color: #4a8862; color: #b8f0c8; }
#previewControls .pc-btn#pcLoop.toggle-on { background: #253a30; border-color: #3f7c58; color: #b8f0c8; }
#previewControls .pc-time { font: 11px ui-monospace, Consolas, monospace; color: #cbd3e2; min-width: 110px; text-align: right; padding: 0 6px; }
#previewControls .pc-seek-wrap { flex: 1 1 auto; min-width: 80px; display: flex; align-items: center; }
#previewControls .pc-seek-track { position: relative; flex: 1 1 auto; height: 8px; background: #0e1014; border: 1px solid #1f242c; border-radius: 4px; cursor: pointer; }
#previewControls .pc-seek-loop { position: absolute; top: 0; bottom: 0; background: #6a86d822; border-left: 1px solid #6a86d855; border-right: 1px solid #6a86d855; pointer-events: none; }
#previewControls .pc-seek-fill { position: absolute; top: 0; bottom: 0; left: 0; background: linear-gradient(90deg, #4c6fb7aa, #88d8a3aa); pointer-events: none; }
#previewControls .pc-seek-thumb { position: absolute; top: -3px; bottom: -3px; width: 3px; background: #d6d9df; box-shadow: 0 0 0 1px #0008; pointer-events: none; }
#viewWrap { position: relative; max-width: 100%; max-height: 100%; display: flex; align-items: center; justify-content: center; }
canvas#view { display: block; max-width: 100%; max-height: 100%; background: #000;
  box-shadow: 0 0 0 1px #23262d, 0 8px 30px #0008; }
#hud { position: absolute; bottom: 8px; left: 12px; font: 10px/1.3 ui-monospace, Consolas, monospace; color: #6a7180; pointer-events: none; text-shadow: 0 0 3px #000; }
#hud .k { color: #9ab; }
#hud .v { color: #cde; }

.panel-resizer { background: #101217; position: relative; }
.panel-resizer::after { content: ""; position: absolute; inset: 0; background: transparent; }
#resizeLeft { grid-area: resizeL; cursor: col-resize; border-left: 1px solid #0b0c10; border-right: 1px solid #242832; }
#resizeRight { grid-area: resizeR; cursor: col-resize; border-left: 1px solid #242832; border-right: 1px solid #0b0c10; }
#resizeBottom { grid-area: resizeB; cursor: row-resize; border-top: 1px solid #242832; border-bottom: 1px solid #0b0c10; }
.is-resizing, .is-resizing * { cursor: inherit !important; user-select: none !important; }

.section { margin-bottom: 10px; border-top: 1px solid #151515; }
.section h3 { margin: 0 -2px 8px; padding: 6px 8px; font-size: 11px; color: #c8c8c8; font-weight: 650; background: #2b2b2b; border-bottom: 1px solid #151515; }
.row { display: flex; gap: 6px; align-items: center; margin: 4px 0; min-width: 0; }
.row label { flex: 0 0 76px; font-size: 11px; color: #b5bbc8; }
.row .v { color: #888f9d; font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; font-size: 10px; }
.row .keybtn { width: 24px; padding: 2px 0; color: #d8c188; }
.toolbar { display: flex; gap: 4px; flex-wrap: wrap; }
.toolbar button { padding: 4px 8px; font-size: 11px; }

#fxStatus { font-size: 10px; color: #a0a7b5; line-height: 1.5; }
.category { border: 1px solid #171717; border-radius: 0; overflow: hidden; background: #202020; margin-bottom: 4px; }
.category-head { display: flex; align-items: center; gap: 6px; width: 100%; border: 0; border-radius: 0; background: #303030; padding: 5px 8px; text-align: left; }
.category-head .twisty { color: var(--muted); width: 10px; }
.category-head .cat-name { flex: 1; font-weight: 650; }
.category-head .cat-count { color: var(--muted); font: 10px/1 ui-monospace, Consolas, monospace; }
.category-body { display: grid; gap: 1px; background: #1b1b1b; padding: 2px; }
.category.closed .category-body { display: none; }
.lib-row, .lane-row { display: flex; align-items: center; gap: 6px; min-width: 0; border: 1px solid transparent; background: #252525; cursor: pointer; }
.lib-row { padding: 5px 6px; }
.lib-row:hover, .lane-row:hover { background: #20252d; }
.lib-row.selected, .lane-row.selected { border-color: #536aa7; background: #202845; }
.lib-row.on, .lane-row.on { box-shadow: inset 3px 0 0 var(--accent); }
.lib-name, .lane-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mvbtn { padding: 1px 6px; font-size: 10px; line-height: 1.1; }
.num { width: 24px; color: #6a7180; font-variant-numeric: tabular-nums; font-size: 10px; flex: 0 0 auto; }
.badge { font-size: 9px; padding: 1px 5px; border-radius: 8px; background: #2a2e36; color: #b5bbc8; flex: 0 0 auto; }
.badge.full { background: #1f3d2a; color: var(--green); }
.badge.lite { background: #3d352a; color: var(--gold); }
.badge.mon  { background: #2a3a4d; color: #88b3d8; }
.selected-title { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.selected-title h2 { margin: 0; font-size: 14px; line-height: 1.2; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.selected-actions { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.fx-body { padding-top: 2px; }
.fx-body .row label { flex-basis: 82px; }
.sub-panel { margin: 8px 0 4px; padding: 6px 8px; background: #1c1f25; border: 1px solid #2a2e36; border-radius: 4px; }
.sub-panel-head { font-size: 10px; font-weight: 650; color: #88b3d8; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 4px; }
.sub-panel .row { gap: 6px; }
.sub-panel .row label { flex-basis: 56px; color: #aeb6c5; }
.sub-panel .row input[type=number] { width: 70px; }
.sub-panel .row .v { font: 10px ui-monospace, Consolas, monospace; color: #aeb6c5; min-width: 56px; text-align: right; }
.sub-panel .row select { padding: 2px 4px; }
.sub-panel .row .mvbtn { padding: 2px 6px; font-size: 10px; }
.empty { color: var(--muted); font-size: 11px; padding: 10px; border: 1px dashed #323743; border-radius: 4px; background: #111318; }

.timeline-controls { display: flex; align-items: center; gap: 10px; padding: 5px 10px; border-bottom: 1px solid #111; background: #2a2a2a; min-height: 34px; overflow-x: auto; }
.timeline-controls label { display: flex; align-items: center; gap: 5px; color: #b5bbc8; white-space: nowrap; }
.timeline-controls input[type=number] { width: 62px; }
.timeline-head { position: relative; flex: 0 0 auto; display: grid; grid-template-columns: var(--track-offset) 1fr; }
.timeline-head .th-spacer { background: #1a1c20; border-right: 1px solid #050505; display: flex; align-items: center; padding: 0 8px; gap: 6px; font-size: 10px; color: #8a92a3; }
.timeline-head .th-spacer .zoom-readout { margin-left: auto; font-family: ui-monospace, Consolas, monospace; color: #aeb6c5; }
.timeline-head .th-spacer .zoom-btn { padding: 1px 6px; font-size: 11px; background: #232830; border: 1px solid #303743; color: #c8c8c8; border-radius: 2px; cursor: pointer; }
.timeline-head .th-spacer .zoom-btn:hover { background: #2c333d; }
.timeline-head .th-track { position: relative; min-width: 0; }
.timeline-head .playhead { z-index: 5; }
#timelineList { position: relative; }
#timelineList .list-playhead { position: absolute; top: 0; bottom: 0; width: 1px; background: #d6d9df66; pointer-events: none; z-index: 6; }
.timeline-ruler { position: relative; height: 28px; border-bottom: 1px solid var(--line-soft); background: #111318; overflow: hidden; cursor: ew-resize; }
.timeline-wave { position: relative; height: 44px; background: #0c0e13; border-bottom: 1px solid var(--line-soft); overflow: hidden; cursor: ew-resize; display: none; }
.timeline-scrollbar { position: relative; height: 12px; background: #15171c; border-top: 1px solid #050505; overflow: hidden; cursor: pointer; display: grid; grid-template-columns: var(--track-offset) 1fr; }
.timeline-scrollbar .sb-spacer { background: #1a1c20; border-right: 1px solid #050505; }
.timeline-scrollbar .sb-track { position: relative; }
.timeline-scrollbar .sb-thumb { position: absolute; top: 2px; bottom: 2px; background: #4a526288; border: 1px solid #5a627aaa; border-radius: 3px; min-width: 18px; cursor: grab; }
.timeline-scrollbar .sb-thumb:active { cursor: grabbing; }
.timeline-wave.has-audio { display: block; }
.timeline-wave .wave-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #4a5260; font: 10px ui-monospace, Consolas, monospace; pointer-events: none; }
.timeline-wave canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
.timeline-wave .wave-name { position: absolute; top: 2px; left: 6px; color: #6a86d8; font: 9px/1 ui-monospace, Consolas, monospace; pointer-events: none; opacity: .7; z-index: 2; }
.timeline-ruler::before {
  content: ""; position: absolute; inset: 0;
  background: repeating-linear-gradient(to right, #313640 0 1px, transparent 1px 80px),
              repeating-linear-gradient(to right, #222730 0 1px, transparent 1px 20px);
}
.ruler-tick { position: absolute; top: 0; bottom: 0; border-left: 1px solid #343a46; color: #707887; font: 10px/1 ui-monospace, Consolas, monospace; }
.ruler-tick.major { border-left-color: #566070; color: #aeb6c5; }
.ruler-tick span { position: absolute; top: 4px; left: 4px; white-space: nowrap; }
.loop-range { position: absolute; top: 0; bottom: 0; background: #6a86d81c; border-left: 1px solid #6a86d877; border-right: 1px solid #6a86d877; pointer-events: none; z-index: 1; }
.inout-marker { position: absolute; top: 0; bottom: 0; width: 1px; background: #d8c188; pointer-events: none; z-index: 2; }
.inout-marker::after { content: attr(data-label); position: absolute; top: 14px; left: 3px; color: #d8c188; font: 9px/1 ui-monospace, Consolas, monospace; }
.playhead { position: absolute; top: 0; bottom: 0; left: 0; width: 2px; background: #d6d9df; box-shadow: 0 0 0 1px #0006; pointer-events: none; z-index: 4; }
#timelineList { overflow: auto; min-height: 0; flex: 1; padding: 4px 6px 8px; }
.lane-row { display: grid; grid-template-columns: var(--track-offset) 1fr; align-items: center; height: 26px; margin-bottom: 3px; padding: 0; }
.lane-row.param { height: 23px; background: #13171d; color: #aeb6c5; }
.lane-row.param.graph { height: 54px; align-items: stretch; padding-top: 5px; padding-bottom: 5px; }
.lane-row.param .lane-name { font-size: 11px; color: #aeb6c5; }
.lane-row .mvbtn { padding: 1px 5px; font-size: 10px; line-height: 1.1; }
.lane-controls { display: flex; align-items: center; gap: 6px; padding: 0 6px; min-width: 0; overflow: hidden; }
.lane-controls .lane-name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lane-row.param .lane-controls { padding-left: 24px; }
.lane-track { position: relative; min-width: 0; height: 12px; background: #101318; border-top: 1px solid #242935; border-bottom: 1px solid #242935; overflow: hidden; align-self: center; }
.lane-row.graph .lane-track { height: 42px; }
.lane-bar { position: absolute; top: 1px; bottom: 1px; border-radius: 1px; background: linear-gradient(90deg, #4c6fb7, #a56a5f); opacity: .9; cursor: grab; min-width: 8px; }
.lane-bar:active { cursor: grabbing; }
.clip-handle { position: absolute; top: -1px; bottom: -1px; width: 7px; border: 0; padding: 0; background: #d6d9df; opacity: .88; cursor: ew-resize; z-index: 2; }
.clip-handle.start { left: 0; border-radius: 1px 0 0 1px; }
.clip-handle.end { right: 0; border-radius: 0 1px 1px 0; }
.lane-row.selected .lane-bar { box-shadow: 0 0 0 1px #d6d9df88; }
.lane-row:not(.on) .lane-bar { opacity: .28; }
.waveform-bg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; opacity: .55; z-index: 0; }
.lane-track > .lane-bar, .lane-track > .key-marker, .lane-track > .graph-canvas, .lane-track > .graph-point { z-index: 2; }
.key-marker { position: absolute; top: 50%; width: 9px; height: 9px; border: 1px solid #14161b; background: #d8c188; transform: translate(-50%,-50%) rotate(45deg); cursor: grab; z-index: 3; }
.key-marker.selected { background: #ffffff; border-color: #6a86d8; box-shadow: 0 0 0 2px #6a86d877; }
.graph-canvas { position: absolute; inset: 1px 0; width: 100%; height: calc(100% - 2px); pointer-events: none; opacity: .9; }
.graph-point { position: absolute; width: 10px; height: 10px; border: 1px solid #101318; border-radius: 50%; background: #88d8a3; transform: translate(-50%,-50%); cursor: grab; }
.graph-point.selected { background: #fff; border-color: #6a86d8; box-shadow: 0 0 0 2px #6a86d877; }
.midi-bindings { display: grid; gap: 3px; margin-top: 6px; }
.midi-binding { display: flex; align-items: center; gap: 5px; min-width: 0; padding: 4px 5px; background: #111318; border: 1px solid var(--line-soft); border-radius: 3px; }
.midi-binding span { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #aeb6c5; font-size: 10px; }
.midi-binding button { padding: 1px 5px; font-size: 10px; }
.context-menu { position: fixed; z-index: 10000; min-width: 220px; background: #222; border: 1px solid #4a4a4a; box-shadow: 0 10px 28px #000b; padding: 4px 0; display: none; }
.context-menu.open { display: block; }
.context-menu button { display: flex; width: 100%; justify-content: space-between; align-items: center; gap: 16px; background: transparent; border: 0; border-radius: 0; padding: 6px 12px; color: #ddd; text-align: left; }
.context-menu button:hover { background: #1f5f9f; color: #fff; }
.context-menu button[disabled] { color: #666; pointer-events: none; }
.context-menu .sep { height: 1px; margin: 4px 0; background: #3a3a3a; }

.recRing { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #d44; margin-right: 4px; vertical-align: middle; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.3; } }
.recProgress { display: inline-block; width: 90px; height: 5px; margin-left: 6px; background: #101318; border: 1px solid #2a2e36; vertical-align: middle; }
.recProgress span { display: block; height: 100%; background: #d44; width: 0%; }

#fpsInfo { font-family: ui-monospace, Consolas, monospace; color: #aeb6c5; }
.note { font-size: 10px; color: #6a7180; margin-top: 4px; line-height: 1.4; }
hr { border: 0; border-top: 1px solid var(--line-soft); margin: 8px 0; }
</style>
</head>
<body>
<div id="app">

<header id="topbar">
  <div class="menu-row">
    <div class="brand">VJ FX Maker</div>
    <button class="menu-button" id="topImportMedia">Import Media</button>
    <button class="menu-button" id="topImportAudio">Import Audio</button>
    <button class="menu-button" id="topPresetLoad">Open Preset</button>
    <button class="menu-button" id="topPresetSave">Save</button>
    <button class="menu-button" id="topRecord">Record</button>
    <button class="menu-button" id="topMIDI">MIDI</button>
    <button class="menu-button" id="topContextHelp">Context</button>
    <div class="workspace-tabs">
      <span class="active">Default</span>
      <span>Learn</span>
      <span>Standard</span>
      <span>Small Screen</span>
    </div>
  </div>
  <div class="tool-row">
    <div class="top-group transport">
      <button class="tool-btn icon" id="rewindBtn" title="先頭">↤</button>
      <button class="tool-btn icon" id="playBtn" title="再生/停止">▶</button>
      <button class="tool-btn" id="loopBtn">Loop</button>

<script>
'use strict';
(function(){

// ===================================================================
// SHADER LIBRARY HEADER (prepended to every effect frag)
// ===================================================================
const SHADER_HEADER = `
precision highp float;
varying vec2 v_uv;
uniform sampler2D u_tex;
uniform sampler2D u_prev;
uniform vec2 u_res;
uniform float u_time;
uniform float u_beat;
uniform float u_audio;
uniform float u_freq;
uniform float u_trigger;
uniform float u_amount;
uniform float u_speed;
uniform float u_mix;
uniform float u_p1;
uniform float u_p2;
uniform float u_p3;
uniform float u_p4;
uniform float u_p5;
uniform float u_p6;
uniform float u_p7;
uniform float u_p8;
uniform vec3 u_colorA;
uniform vec3 u_colorB;

vec3 rgb2hsv(vec3 c){
  vec4 K = vec4(0.0, -1.0/3.0, 2.0/3.0, -1.0);
  vec4 p = mix(vec4(c.bg, K.wz), vec4(c.gb, K.xy), step(c.b, c.g));
  vec4 q = mix(vec4(p.xyw, c.r), vec4(c.r, p.yzx), step(p.x, c.r));
  float d = q.x - min(q.w, q.y);
  float e = 1.0e-10;
  return vec3(abs(q.z + (q.w - q.y) / (6.0*d + e)), d / (q.x + e), q.x);
}
vec3 hsv2rgb(vec3 c){
  vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
  vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
  return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}
float hash11(float p){ return fract(sin(p*78.233)*43758.5453); }
float hash12(vec2 p){ return fract(sin(dot(p, vec2(12.9898,78.233)))*43758.5453); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  float a = hash12(i), b = hash12(i+vec2(1,0)),
        c = hash12(i+vec2(0,1)), d = hash12(i+vec2(1,1));
  vec2 u = f*f*(3.0-2.0*f);
  return mix(a,b,u.x) + (c-a)*u.y*(1.0-u.x) + (d-b)*u.x*u.y;
}
vec4 sampleEdge(vec2 uv){ return texture2D(u_tex, clamp(uv, 0.001, 0.999)); }
`;

const VERT = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main(){
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

const COPY_FRAG = `
precision highp float;
varying vec2 v_uv;
uniform sampler2D u_tex;
void main(){ gl_FragColor = texture2D(u_tex, v_uv); }`;

const BLEND_FRAG = `
precision highp float;
varying vec2 v_uv;
uniform sampler2D u_texA;
uniform sampler2D u_texB;
uniform float u_mix;
void main(){
  gl_FragColor = mix(texture2D(u_texA, v_uv), texture2D(u_texB, v_uv), u_mix);
}`;

// ===================================================================
// EFFECT DEFINITIONS
// ===================================================================
// st: 'full' = full WebGL, 'lite' = simplified, 'mon' = monitor only
// extras: [{key,label,min,max,def,type}] map to u_p1..u_p8 (8 numeric max)
// defaults: { amount, speed, mix, bpmSync, audioReactive, ...extras }
// ===================================================================

const EFFECTS = [
// 1
{id:'zoom', name:'01 ズーム', st:'full',
 def:{amount:0.3, mix:1},
 frag:`
  float s = 1.0 + (u_amount-0.5) * 4.0;
  vec2 uv = (v_uv - vec2(0.5+(u_p1-0.5)*0.5, 0.5+(u_p2-0.5)*0.5)) / s + 0.5;
  gl_FragColor = mix(texture2D(u_tex,v_uv), sampleEdge(uv), u_mix);`,
 extras:[
   {key:'cx',label:'centerX',min:0,max:1,def:0.5},
   {key:'cy',label:'centerY',min:0,max:1,def:0.5}
 ]},
// 2
{id:'pan', name:'02 パン', st:'full',
 def:{amount:0.3, speed:0.3, mix:1},
 frag:`
  vec2 dir = vec2((u_p1-0.5)*2.0, (u_p2-0.5)*2.0);
  vec2 uv = v_uv - dir * u_amount + dir * u_time * u_speed * 0.2;
  uv = fract(uv);
  gl_FragColor = mix(texture2D(u_tex,v_uv), texture2D(u_tex, uv), u_mix);`,
 extras:[
   {key:'dx',label:'dirX',min:0,max:1,def:0.7},
   {key:'dy',label:'dirY',min:0,max:1,def:0.5}
 ]},
// 3
{id:'crop', name:'03 クロップ', st:'full',
 def:{amount:0.4, mix:1},
 frag:`
  vec2 c = (v_uv - 0.5) * (1.0 - u_amount*0.95) + 0.5;
  gl_FragColor = mix(texture2D(u_tex,v_uv), texture2D(u_tex, c), u_mix);`,
 extras:[]},
// 4
{id:'rotate', name:'04 回転', st:'full',
 def:{amount:0.5, speed:0, mix:1},
 frag:`
  float a = (u_amount-0.5) * 6.2832 + u_time * u_speed * 2.0;
  vec2 c = v_uv - 0.5;
  mat2 R = mat2(cos(a), -sin(a), sin(a), cos(a));
  vec2 uv = R * c + 0.5;
  gl_FragColor = mix(texture2D(u_tex,v_uv), sampleEdge(uv), u_mix);`,
 extras:[]},
// 5
{id:'mirror', name:'05 ミラー', st:'full',
 def:{amount:1, mix:1},
 frag:`
  vec2 uv = v_uv;
  if (u_p1 > 0.5) uv.x = uv.x < 0.5 ? uv.x : 1.0 - uv.x;
  if (u_p2 > 0.5) uv.y = uv.y < 0.5 ? uv.y : 1.0 - uv.y;
  gl_FragColor = mix(texture2D(u_tex,v_uv), texture2D(u_tex,uv), u_mix);`,
 extras:[
   {key:'mx',label:'X反転',min:0,max:1,def:1},
   {key:'my',label:'Y反転',min:0,max:1,def:0}
 ]},
// 6
{id:'tile', name:'06 タイル', st:'full',
 def:{amount:0.4, mix:1},
 frag:`
  float n = floor(2.0 + u_amount * 14.0);
  vec2 uv = fract(v_uv * n);
  gl_FragColor = mix(texture2D(u_tex,v_uv), texture2D(u_tex,uv), u_mix);`,
 extras:[]},
// 7
{id:'kaleido', name:'07 万華鏡', st:'full',
 def:{amount:0.5, speed:0.2, mix:1},
 frag:`
  vec2 c = v_uv - 0.5;
  float r = length(c);
  float a = atan(c.y, c.x);
  float n = floor(3.0 + u_amount * 10.0);
  float seg = 6.2832 / n;
  a = mod(a + u_time * u_speed * 0.6, seg);
  a = abs(a - seg*0.5);
  vec2 uv = vec2(cos(a), sin(a)) * r + 0.5;
  gl_FragColor = mix(texture2D(u_tex,v_uv), sampleEdge(uv), u_mix);`,
 extras:[]},
// 8
{id:'split', name:'08 スプリット', st:'full',
 def:{amount:0.4, mix:1},
 frag:`
  float n = floor(2.0 + u_amount * 5.0);
  vec2 uv = vec2(fract(v_uv.x * n), v_uv.y);
  gl_FragColor = mix(texture2D(u_tex,v_uv), texture2D(u_tex,uv), u_mix);`,
 extras:[]},
// 9
{id:'pip', name:'09 PiP', st:'full',
 def:{amount:0.3, mix:1},
 frag:`
  vec4 base = texture2D(u_tex, v_uv);
  float s = 0.1 + u_amount * 0.4;
  vec2 box = (v_uv - vec2(u_p1, u_p2)) / s + 0.5;
  vec4 col = base;
  if (box.x > 0.0 && box.x < 1.0 && box.y > 0.0 && box.y < 1.0) {
    col = mix(base, texture2D(u_tex, box), u_mix);
    if (box.x < 0.01 || box.x > 0.99 || box.y < 0.01 || box.y > 0.99)
      col = vec4(0.0, 0.0, 0.0, 1.0);
  }
  gl_FragColor = col;`,
 extras:[
   {key:'px',label:'posX',min:0,max:1,def:0.75},
   {key:'py',label:'posY',min:0,max:1,def:0.75}
 ]},
// 10
{id:'wrapscroll', name:'10 ラップスクロール', st:'full',
 def:{amount:0.5, speed:0.5, mix:1},
 frag:`
  vec2 d = vec2((u_p1-0.5)*2.0, (u_p2-0.5)*2.0);
  vec2 uv = fract(v_uv + d * u_time * u_speed * 0.5);
  gl_FragColor = mix(texture2D(u_tex,v_uv), texture2D(u_tex, uv), u_mix);`,
 extras:[
   {key:'dx',label:'dirX',min:0,max:1,def:1},
   {key:'dy',label:'dirY',min:0,max:1,def:0.5}
 ]},
// 11
{id:'hue', name:'11 色相回転', st:'full',
 def:{amount:0.5, speed:0, mix:1},
 frag:`
  vec4 c = texture2D(u_tex, v_uv);
  vec3 h = rgb2hsv(c.rgb);
  h.x = fract(h.x + (u_amount-0.5) + u_time*u_speed*0.2);
  gl_FragColor = vec4(mix(c.rgb, hsv2rgb(h), u_mix), c.a);`,
 extras:[]},
// 12
{id:'sat', name:'12 彩度', st:'full',
 def:{amount:0.5, mix:1},
 frag:`
  vec4 c = texture2D(u_tex, v_uv);
  float l = dot(c.rgb, vec3(0.299, 0.587, 0.114));
  vec3 r = mix(vec3(l), c.rgb, u_amount * 2.0);
  gl_FragColor = vec4(mix(c.rgb, r, u_mix), c.a);`,
 extras:[]},
// 13
{id:'contrast', name:'13 コントラスト', st:'full',
 def:{amount:0.5, mix:1},
 frag:`
  vec4 c = texture2D(u_tex, v_uv);
  float k = (u_amount - 0.5) * 3.0 + 1.0;
  vec3 r = (c.rgb - 0.5) * k + 0.5;
  gl_FragColor = vec4(mix(c.rgb, r, u_mix), c.a);`,
 extras:[]},
// 14
{id:'bright', name:'14 明るさ', st:'full',
 def:{amount:0.5, mix:1},
 frag:`
  vec4 c = texture2D(u_tex, v_uv);
  vec3 r = c.rgb + (u_amount - 0.5) * 1.5;
  gl_FragColor = vec4(mix(c.rgb, clamp(r, 0.0, 1.5), u_mix), c.a);`,
 extras:[]},
// 15
{id:'gamma', name:'15 ガンマ', st:'full',
 def:{amount:0.5, mix:1},
 frag:`
  vec4 c = texture2D(u_tex, v_uv);
  float g = u_amount < 0.5
    ? mix(0.3, 1.0, u_amount * 2.0)
    : mix(1.0, 3.0, (u_amount - 0.5) * 2.0);
  vec3 r = pow(max(c.rgb, vec3(0.0)), vec3(1.0/g));
  gl_FragColor = vec4(mix(c.rgb, r, u_mix), c.a);`,
 extras:[]},
// 16
{id:'invert', name:'16 反転', st:'full',
 def:{amount:1, mix:1},
 frag:`
  vec4 c = texture2D(u_tex, v_uv);
  gl_FragColor = vec4(mix(c.rgb, 1.0 - c.rgb, u_amount * u_mix), c.a);`,
 extras:[]},
// 17
{id:'mono', name:'17 モノクロ', st:'full',
 def:{amount:1, mix:1},
 frag:`
  vec4 c = texture2D(u_tex, v_uv);
  float l = dot(c.rgb, vec3(0.299, 0.587, 0.114));
  gl_FragColor = vec4(mix(c.rgb, vec3(l), u_amount * u_mix), c.a);`,
 extras:[]},
// 18
{id:'gradmap', name:'18 グラデーションマップ', st:'full',

function compile(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    console.error('shader err:', gl.getShaderInfoLog(sh), '\n', src);
    gl.deleteShader(sh); return null;
  }
  return sh;
}
function makeProgram(vert, frag) {
  const v = compile(gl.VERTEX_SHADER, vert);
  const f = compile(gl.FRAGMENT_SHADER, frag);
  if (!v || !f) return null;
  const p = gl.createProgram();
  gl.attachShader(p, v); gl.attachShader(p, f);
  gl.bindAttribLocation(p, 0, 'a_pos');
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('prog err:', gl.getProgramInfoLog(p));
    return null;
  }
  const u = {};
  ['u_tex','u_prev','u_res','u_time','u_beat','u_audio','u_freq','u_trigger',
   'u_amount','u_speed','u_mix','u_p1','u_p2','u_p3','u_p4','u_p5','u_p6','u_p7','u_p8',
   'u_colorA','u_colorB'].forEach(n => u[n] = gl.getUniformLocation(p, n));
  return { program: p, u };
}

function makeFBO(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { fbo, tex, w, h };
}

let fboA = null, fboB = null, fboPrev = null, fboSceneA = null, fboSceneB = null;

  if (fboSceneB) { gl.deleteTexture(fboSceneB.tex); gl.deleteFramebuffer(fboSceneB.fbo); }
  fboA = makeFBO(w, h); fboB = makeFBO(w, h); fboPrev = makeFBO(w, h);

function drawDemo(t) {
  const w = demoCanvas.width, h = demoCanvas.height;
  const g = demoCtx.createLinearGradient(0,0,w,h);
  const hue = (t*30) % 360;
  g.addColorStop(0, `hsl(${hue}, 80%, 25%)`);
  g.addColorStop(1, `hsl(${(hue+120)%360}, 80%, 18%)`);
  demoCtx.fillStyle = g; demoCtx.fillRect(0,0,w,h);
  for (let i = 0; i < 8; i++) {
    demoCtx.beginPath();
    const x = w/2 + Math.cos(t*0.7 + i)*w*0.3;
    const y = h/2 + Math.sin(t*0.9 + i*1.3)*h*0.3;
    const r = 30 + Math.sin(t*2 + i)*20 + i*8;
    demoCtx.fillStyle = `hsla(${(hue + i*45)%360}, 90%, 65%, 0.6)`;
    demoCtx.arc(x, y, r, 0, Math.PI*2);
    demoCtx.fill();
  }
  demoCtx.strokeStyle = 'rgba(255,255,255,0.4)';
  demoCtx.lineWidth = 2;
  for (let i = 0; i < 12; i++) {
    demoCtx.beginPath();
    const a = t*0.5 + i*Math.PI/6;
    demoCtx.moveTo(w/2, h/2);
    demoCtx.lineTo(w/2 + Math.cos(a)*w, h/2 + Math.sin(a)*h);

  }
  demoCtx.fillStyle = '#fff';
  demoCtx.font = 'bold 48px sans-serif';
  demoCtx.textAlign = 'center';
  demoCtx.fillText('VJ FX', w/2, h/2 - 20);

  demoCtx.fillText('DEMO', w/2, h/2 + 20);
}

function hexToVec3(h) {
  if (typeof h !== 'string') return [1,1,1];
  const m = h.replace('#','');
  const r = parseInt(m.substr(0,2),16)/255;
  const g = parseInt(m.substr(2,2),16)/255;
  const b = parseInt(m.substr(4,2),16)/255;
  return [r,g,b];
}
function vec3ToHex(v) {
  const parts = v.map(n => {
    const x = Math.max(0, Math.min(255, Math.round(n * 255)));
    return x.toString(16).padStart(2, '0');
  });
  return '#' + parts.join('');
}

function bindFBO(f) {
  if (f) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, f.fbo);
    gl.viewport(0, 0, f.w, f.h);
  } else {
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);

  }
}
function drawQuad() {
  gl.bindBuffer(gl.ARRAY_BUFFER, quad);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  gl.drawArrays(gl.TRIANGLES, 0, 6);
}

let frameCount = 0, lastFps = performance.now(), curFps = 0;

function sortedKeyframes(layer, paramKey) {
  const keys = layer.keyframes[paramKey] || [];
  keys.sort((a, b) => a.t - b.t);
  return keys;
}

function sampleKeyframes(base, keys, t) {
  if (!keys || !keys.length) return base;
  if (t <= keys[0].t) return keys[0].v;
  const last = keys[keys.length - 1];
  if (t >= last.t) return last.v;
  for (let i = 0; i < keys.length - 1; i++) {
    const a = keys[i], b = keys[i + 1];
    if (t >= a.t && t <= b.t) {
      const k = (t - a.t) / Math.max(0.0001, b.t - a.t);
      if (typeof a.v === 'number' && typeof b.v === 'number') return a.v + (b.v - a.v) * k;
      if (typeof a.v === 'string' && typeof b.v === 'string') {
        const ca = hexToVec3(a.v), cb = hexToVec3(b.v);
        return vec3ToHex(ca.map((v, idx) => v + (cb[idx] - v) * k));
      }
      return k < 0.5 ? a.v : b.v;
    }
  }
  return base;
}

function evaluateLayerValues(layer, t) {
  const values = {...layer.values};
  Object.keys(layer.keyframes || {}).forEach(paramKey => {
    values[paramKey] = sampleKeyframes(values[paramKey], sortedKeyframes(layer, paramKey), t);
  });
  layer.renderValues = values;
  return values;
}

function effectiveAmount(values, layer) {
  const v = values;
  let amt = v.amount;
  if (v.bpmSync) amt += v.bpmSync * 0.5 * Math.sin(state.beatPhase * Math.PI * 2);
  if (v.audioReactive) amt += v.audioReactive * 0.5 * state.audio.level;
  if (v.fftTrigger) {
    const env = (layer && layer.fft) ? (layer.fft._env || 0) : state.audio.triggerEnv;
    amt += v.fftTrigger * 0.8 * env;
  }
  return Math.max(0, Math.min(1.5, amt));
}

function formatTime(t) {
  const safe = Math.max(0, t);
  const minutes = Math.floor(safe / 60);
  const seconds = safe % 60;
  return `${String(minutes).padStart(2,'0')}:${seconds.toFixed(1).padStart(4,'0')}`;
}

function beatDuration() {
  return 60 / Math.max(1, state.bpm);
}

// ===================================================================
// TIMELINE VIEWPORT (zoom + scroll)
// ===================================================================
function viewVisibleDuration() {
  const dur = Math.max(0.001, state.comp.duration);
  return dur / Math.max(1, state.view.zoom || 1);
}
function viewStartTime() {
  const dur = Math.max(0.001, state.comp.duration);
  const visible = viewVisibleDuration();
  const maxScroll = Math.max(0, dur - visible);
  return clamp(state.view.scroll, 0, 1) * maxScroll;
}
function timeToPct(t) {
  const visible = viewVisibleDuration();
  if (visible <= 0) return 0;
  return (t - viewStartTime()) / visible * 100;
}
function pctToTime(pct) {
  return viewStartTime() + (pct / 100) * viewVisibleDuration();
}
function clampViewScroll() {
  state.view.zoom = clamp(state.view.zoom || 1, 1, 64);
  state.view.scroll = clamp(state.view.scroll || 0, 0, 1);
}
function setViewZoom(nextZoom, anchorTime) {
  const oldZoom = state.view.zoom || 1;
  nextZoom = clamp(nextZoom, 1, 64);
  if (nextZoom === oldZoom) return;
  const dur = Math.max(0.001, state.comp.duration);
  const oldVisible = dur / oldZoom;
  const newVisible = dur / nextZoom;
  const oldStart = state.view.scroll * Math.max(0, dur - oldVisible);
  const anchor = anchorTime ?? (oldStart + oldVisible / 2);
  const fraction = (anchor - oldStart) / Math.max(0.0001, oldVisible);
  const newStart = clamp(anchor - fraction * newVisible, 0, Math.max(0, dur - newVisible));
  state.view.zoom = nextZoom;
  state.view.scroll = (dur - newVisible) > 0.0001 ? newStart / (dur - newVisible) : 0;
  clampViewScroll();
}
function setViewScroll(scroll01) {
  state.view.scroll = clamp(scroll01, 0, 1);
}
function ensurePlayheadVisible() {
  const t = state.play.time;
  const start = viewStartTime();
  const visible = viewVisibleDuration();
  if (t < start) {
    const dur = Math.max(0.001, state.comp.duration);
    state.view.scroll = (dur - visible) > 0.0001 ? Math.max(0, t - visible * 0.1) / (dur - visible) : 0;
    clampViewScroll();
  } else if (t > start + visible) {
    const dur = Math.max(0.001, state.comp.duration);
    state.view.scroll = (dur - visible) > 0.0001 ? Math.min(1, (t - visible * 0.9) / (dur - visible)) : 0;
    clampViewScroll();
  }
}

function snapTime(t) {
  const mode = state.comp.snap;
  if (mode === 'none') return t;
  const beat = beatDuration();
  const step = mode === 'beat' ? beat : mode === 'half' ? beat / 2 : beat / 4;
  return Math.round(t / step) * step;
}

function setTimelineTime(t, opts = {}) {
  const next = opts.snap ? snapTime(t) : t;
  state.play.time = clamp(next, 0, state.comp.duration);
  if (opts.autopan !== false) ensurePlayheadVisible();
  updateTimelineVisuals();
}

function advancePlayback(now) {
  if (!state.play.playing) {
    state.play.lastWall = now;
    return;
  }
  const dt = Math.max(0, Math.min(0.25, now - state.play.lastWall));
  state.play.lastWall = now;
  let next = state.play.time + dt;
  if (next < state.comp.inPoint) next = state.comp.inPoint;
  if (next >= state.comp.outPoint) {
    if (state.comp.loop && state.comp.outPoint > state.comp.inPoint) {
      const len = state.comp.outPoint - state.comp.inPoint;
      next = state.comp.inPoint + ((next - state.comp.inPoint) % len);
    } else {
      next = state.comp.outPoint;
      state.play.playing = false;
      updateTransportButtons();
    }
  }
  setTimelineTime(next);
}

function isLayerActiveAt(layer, t) {
  const start = layer.start ?? 0;
  const end = layer.end ?? state.comp.duration;
  return layer.enabled && t >= start && t <= end;
}

function renderLayerStack(layers, outFbo, t) {
  const enabled = layers.filter(layer => isLayerActiveAt(layer, t));
  let curTex = srcTex;
  let target = fboA, alt = fboB;

  for (const layer of enabled) {
    const def = EFFECTS.find(d => d.id === layer.effId);
    if (!def || def.st === 'mon') continue;
    const prog = getProg(def);
    if (!prog) continue;
    const values = evaluateLayerValues(layer, t);

    bindFBO(target);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(prog.program);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, curTex);
    gl.uniform1i(prog.u.u_tex, 0);
    gl.activeTexture(gl.TEXTURE1);
    gl.bindTexture(gl.TEXTURE_2D, fboPrev.tex);
    gl.uniform1i(prog.u.u_prev, 1);

    gl.uniform2f(prog.u.u_res, target.w, target.h);
    gl.uniform1f(prog.u.u_time, t);
    gl.uniform1f(prog.u.u_beat, state.beatPhase);
    gl.uniform1f(prog.u.u_audio, state.audio.level);
    const layerFftLevel = layer.fft ? (layer.fft._level || 0) : state.audio.freqLevel;
    const layerFftEnv = layer.fft ? (layer.fft._env || 0) : state.audio.triggerEnv;
    gl.uniform1f(prog.u.u_freq, layerFftLevel);
    gl.uniform1f(prog.u.u_trigger, layerFftEnv);

    gl.uniform1f(prog.u.u_amount, effectiveAmount(values, layer));
    gl.uniform1f(prog.u.u_speed, values.speed);
    gl.uniform1f(prog.u.u_mix, values.mix);

    // map numeric extras to p1..p8 (color extras get separate slots)
    const ps = [0,0,0,0,0,0,0,0];
    let pi = 0;
    let cA = [1,1,1], cB = [0,0,0];
    if (def.extras) {
      for (const x of def.extras) {
        if (x.type === 'color') {
          if (x.key === 'cA' || x.key === 'colorA') cA = hexToVec3(values[x.key]);
          else if (x.key === 'cB' || x.key === 'colorB') cB = hexToVec3(values[x.key]);
        } else {
          if (pi < 8) ps[pi++] = values[x.key];
        }
      }
    }
    gl.uniform1f(prog.u.u_p1, ps[0]);
    gl.uniform1f(prog.u.u_p2, ps[1]);
    gl.uniform1f(prog.u.u_p3, ps[2]);
    gl.uniform1f(prog.u.u_p4, ps[3]);
    gl.uniform1f(prog.u.u_p5, ps[4]);
    gl.uniform1f(prog.u.u_p6, ps[5]);
    gl.uniform1f(prog.u.u_p7, ps[6]);
    gl.uniform1f(prog.u.u_p8, ps[7]);
    gl.uniform3f(prog.u.u_colorA, cA[0], cA[1], cA[2]);
    gl.uniform3f(prog.u.u_colorB, cB[0], cB[1], cB[2]);

    drawQuad();

    curTex = target.tex;
    [target, alt] = [alt, target];
  }

  bindFBO(outFbo);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(copyProg.program);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, curTex);
  gl.uniform1i(copyTexLoc, 0);
  drawQuad();
  return enabled.filter(layer=>{const d=EFFECTS.find(D=>D.id===layer.effId);return d&&d.st!=='mon';}).length;
}

function drawTexture(tex, outFbo = null) {
  bindFBO(outFbo);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(copyProg.program);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.uniform1i(copyTexLoc, 0);
  drawQuad();
}

function drawSceneBlend(mix, outFbo = null) {
  bindFBO(outFbo);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(blendProg.program);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, fboSceneA.tex);
  gl.uniform1i(blendTexALoc, 0);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, fboSceneB.tex);
  gl.uniform1i(blendTexBLoc, 1);
  gl.uniform1f(blendMixLoc, mix);
  drawQuad();
}

function render() {
  const now = performance.now() / 1000;
  advancePlayback(now);
  const t = state.play.time;
  state.beatPhase = ((t * state.bpm / 60) % 1 + 1) % 1;

  uploadSource(t);

  const W = canvas.width, H = canvas.height;
  ensureFBOs(W, H);

  const mix = state.crossfader;
  let passCount = 0;
  if (mix <= 0.001) {
    passCount += renderLayerStack(state.scenes[0].layers, fboSceneA, t);
    drawTexture(fboSceneA.tex, null);
    drawTexture(fboSceneA.tex, fboPrev);
  } else if (mix >= 0.999) {
    passCount += renderLayerStack(state.scenes[1].layers, fboSceneB, t);
    drawTexture(fboSceneB.tex, null);
    drawTexture(fboSceneB.tex, fboPrev);
  } else {
    passCount += renderLayerStack(state.scenes[0].layers, fboSceneA, t);
    passCount += renderLayerStack(state.scenes[1].layers, fboSceneB, t);
    drawSceneBlend(mix, fboPrev);
    drawTexture(fboPrev.tex, null);
  }

  // FPS
  frameCount++;
  if (now * 1000 - lastFps > 1000) {
    curFps = frameCount;
    frameCount = 0;
    lastFps = now * 1000;
    document.getElementById('fpsInfo').textContent =
      `FPS ${curFps}  ${canvas.width}x${canvas.height}  passes:${passCount}`;
  }

  // HUD
  document.getElementById('hud').innerHTML =
    `<span class="k">BPM</span> <span class="v">${state.bpm.toFixed(1)}</span>  ` +
    `<span class="k">beat</span> <span class="v">${state.beatPhase.toFixed(2)}</span>  ` +
    `<span class="k">audio</span> <span class="v">${state.audio.level.toFixed(2)}</span>  ` +
    `<span class="k">freq</span> <span class="v">${state.audio.freqLevel.toFixed(2)}</span>  ` +
    `<span class="k">trig</span> <span class="v">${state.audio.triggerEnv.toFixed(2)}</span>`;
  document.getElementById('beatBar').value = state.beatPhase;
  document.getElementById('audioBar').value = Math.min(1, state.audio.level);
  document.getElementById('timecode').textContent = formatTime(t);
  const infoPanel = document.getElementById('infoPanel');
  if (infoPanel) {
    infoPanel.innerHTML =
      `<span>Scene</span><span>${state.activeScene ? 'B' : 'A'} / XF ${state.crossfader.toFixed(2)}</span>` +
      `<span>Time</span><span>${formatTime(t)}</span>` +
      `<span>Audio</span><span>${state.audio.level.toFixed(2)}</span>` +
      `<span>FFT</span><span>${state.audio.freqLevel.toFixed(2)} / ${state.audio.triggerEnv.toFixed(2)}</span>` +
      `<span>Layers</span><span>${state.layers.filter(layer => layer.enabled).length}/${state.layers.length}</span>`;
  }
  updateTimelineVisuals();
  if (state.recording && !state.play.playing && state.play.time >= state.comp.outPoint - 1 / 120) {
    stopRec();
  }

  requestAnimationFrame(render);
}

function resizeCanvas() {
  const wrap = document.getElementById('viewWrap');
  const cR = document.getElementById('center').getBoundingClientRect();
  const baseW = 1280, baseH = 720;
  const scale = state.resScale;
  // intrinsic resolution
  canvas.width  = Math.max(64, Math.floor(baseW * scale));
  canvas.height = Math.max(64, Math.floor(baseH * scale));
  // fit display to center area, preserve 16:9
  const aw = cR.width - 16, ah = cR.height - 16;
  const ar = baseW / baseH;
  let dw = aw, dh = aw / ar;
  if (dh > ah) { dh = ah; dw = ah * ar; }
  canvas.style.width = dw + 'px';
  canvas.style.height = dh + 'px';
}

let tapTimes = [];
document.getElementById('tapBpm').addEventListener('click', () => {
  const now = performance.now();
  tapTimes.push(now);
  if (tapTimes.length > 5) tapTimes.shift();
  if (tapTimes.length >= 2) {
    const diffs = [];
    for (let i = 1; i < tapTimes.length; i++) diffs.push(tapTimes[i] - tapTimes[i-1]);
    const avg = diffs.reduce((a,b)=>a+b,0) / diffs.length;
    if (avg < 2000) {
      state.bpm = Math.max(20, Math.min(300, 60000 / avg));
      bpmInput.value = state.bpm.toFixed(1);
      rebuildTimelineRuler();
    }
  }
  setTimeout(() => { if (performance.now() - now > 1500) tapTimes = []; }, 1600);
});

const rewindBtn = document.getElementById('rewindBtn');

const undoBtn = document.getElementById('undoBtn');

let loopRangeEl = null;
let inMarkerEl = null;
let outMarkerEl = null;

function cloneData(v) {
  return JSON.parse(JSON.stringify(v));
}

function snapshotState() {
  return {
    scenes: cloneData(state.scenes),
    activeScene: state.activeScene,
    crossfader: state.crossfader,
    nextLayerSeq: state.nextLayerSeq,
    selectedLayerId: state.selectedLayerId,
    selectedKey: state.selectedKey ? {...state.selectedKey} : null,
    comp: {...state.comp},
    bpm: state.bpm,
    midi: {
      bindings: cloneData(state.midi.bindings),
      nextBindingId: state.midi.nextBindingId
    }
  };
}

function restoreSnapshot(snap) {
  if (snap.scenes) {
    state.scenes = cloneData(snap.scenes);
    state.activeScene = snap.activeScene ?? 0;
    state.crossfader = snap.crossfader ?? 0;
  } else {
    state.layers = cloneData(snap.layers || []);
  }
  state.nextLayerSeq = snap.nextLayerSeq;
  state.selectedLayerId = snap.selectedLayerId;
  state.selectedKey = snap.selectedKey ? {...snap.selectedKey} : null;
  state.comp = {...snap.comp};
  state.bpm = snap.bpm;
  if (snap.midi) {
    state.midi.bindings = cloneData(snap.midi.bindings || []);
    state.midi.nextBindingId = snap.midi.nextBindingId || nextMidiBindingId();
  }
  normalizeAllLayerClips();
  bpmInput.value = state.bpm.toFixed(1);
  setTimelineTime(state.play.time);
  syncTimelineControls();
  updateSceneControls();
  refreshMidiUI();
  rebuildTimelineRuler();
  refreshFxUI();
}

function updateHistoryButtons() {
  undoBtn.disabled = !state.history.past.length;
  redoBtn.disabled = !state.history.future.length;
}

function pushHistory(label, before, after = snapshotState()) {
  if (JSON.stringify(before) === JSON.stringify(after)) return;
  state.history.past.push({label, before, after});
  if (state.history.past.length > 100) state.history.past.shift();
  state.history.future = [];
  updateHistoryButtons();
}

function runCommand(label, fn) {
  const before = snapshotState();
  fn();
  pushHistory(label, before);
}

function undo() {
  const cmd = state.history.past.pop();
  if (!cmd) return;
  state.history.future.push(cmd);
  restoreSnapshot(cmd.before);
  updateHistoryButtons();
}

function redo() {
  const cmd = state.history.future.pop();
  if (!cmd) return;
  state.history.past.push(cmd);
  restoreSnapshot(cmd.after);
  updateHistoryButtons();
}

function updateTransportButtons() {
  playBtn.textContent = state.play.playing ? '停止' : '再生';
  loopBtn.classList.toggle('toggle-on', state.comp.loop);
  const pcPlay = document.getElementById('pcPlay');
  if (pcPlay) {
    pcPlay.textContent = state.play.playing ? '⏸' : '▶';
    pcPlay.classList.toggle('playing', state.play.playing);
  }
  const pcLoop = document.getElementById('pcLoop');
  if (pcLoop) pcLoop.classList.toggle('toggle-on', state.comp.loop);
  updateHistoryButtons();
}

function updatePreviewSeekUI() {
  const pcTimecode = document.getElementById('pcTimecode');
  const pcSeekFill = document.getElementById('pcSeekFill');
  const pcSeekThumb = document.getElementById('pcSeekThumb');
  const pcSeekLoop = document.getElementById('pcSeekLoop');
  const dur = Math.max(0.001, state.comp.duration);
  const pct = clamp(state.play.time / dur, 0, 1) * 100;
  if (pcTimecode) pcTimecode.textContent = `${formatTime(state.play.time)} / ${formatTime(dur)}`;
  if (pcSeekFill) pcSeekFill.style.width = pct.toFixed(3) + '%';
  if (pcSeekThumb) pcSeekThumb.style.left = pct.toFixed(3) + '%';
  if (pcSeekLoop) {
    const lp = state.comp.inPoint / dur * 100;
    const rp = state.comp.outPoint / dur * 100;
    pcSeekLoop.style.left = lp.toFixed(3) + '%';
    pcSeekLoop.style.width = Math.max(0, rp - lp).toFixed(3) + '%';
  }
}

function syncTimelineControls() {
  durationInput.value = state.comp.duration.toFixed(0);
  timeModeSelect.value = state.comp.timeMode;
  snapSelect.value = state.comp.snap;
  inPointInput.max = state.comp.duration;
  outPointInput.max = state.comp.duration;
  inPointInput.value = state.comp.inPoint.toFixed(2);
  outPointInput.value = state.comp.outPoint.toFixed(2);
  updateTransportButtons();
}

function rebuildTimelineRuler() {
  timelineRuler.querySelectorAll('.ruler-tick,.loop-range,.inout-marker,.waveform-bg').forEach(el => el.remove());
  loopRangeEl = document.createElement('div');
  loopRangeEl.className = 'loop-range';
  inMarkerEl = document.createElement('div');
  inMarkerEl.className = 'inout-marker';
  inMarkerEl.dataset.label = 'I';
  outMarkerEl = document.createElement('div');
  outMarkerEl.className = 'inout-marker';
  outMarkerEl.dataset.label = 'O';
  timelineRuler.appendChild(loopRangeEl);
  timelineRuler.appendChild(inMarkerEl);
  timelineRuler.appendChild(outMarkerEl);

  const duration = state.comp.duration;
  if (state.comp.timeMode === 'beat') {
    const beat = beatDuration();
    const totalBeats = Math.ceil(duration / beat);
    for (let i = 0; i <= totalBeats; i++) {
      const t = Math.min(duration, i * beat);
      addRulerTick(t, i % 4 === 0, i % 4 === 0 ? String(i + 1) : '');
    }
  } else {
    const major = duration <= 12 ? 1 : duration <= 30 ? 2 : 5;
    const minor = major / 4;
    for (let t = 0; t <= duration + 0.0001; t += minor) {
      const isMajor = Math.abs((t / major) - Math.round(t / major)) < 0.001;
      addRulerTick(Math.min(duration, t), isMajor, isMajor ? `${Math.round(t)}s` : '');
    }
  }
  refreshWaveStrip();
  updateTimelineVisuals();
}

function addRulerTick(t, major, label) {
  const pct = timeToPct(t);
  if (pct < -2 || pct > 102) return;
  const tick = document.createElement('div');
  tick.className = 'ruler-tick' + (major ? ' major' : '');
  tick.style.left = pct.toFixed(3) + '%';
  if (label) tick.innerHTML = `<span>${label}</span>`;
  timelineRuler.appendChild(tick);
}

function refreshWaveStrip() {
  const strip = document.getElementById('timelineWave');
  const nameEl = document.getElementById('waveName');
  if (!strip) return;
  const waveform = state.audio.waveform;
  strip.classList.toggle('has-audio', !!waveform);
  if (nameEl) nameEl.textContent = waveform ? waveform.name : '';
  if (waveform) requestAnimationFrame(() => drawWaveformCanvas(document.getElementById('waveCanvas')));
}

function drawWaveformCanvas(canvas) {
  const waveform = state.audio.waveform;
  if (!waveform || !canvas) return;
  const rect = canvas.getBoundingClientRect();
  const w = Math.max(1, Math.floor(rect.width * devicePixelRatio));
  const h = Math.max(1, Math.floor(rect.height * devicePixelRatio));
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  // mid line
  ctx.strokeStyle = 'rgba(106, 134, 216, 0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h * 0.5);
  ctx.lineTo(w, h * 0.5);
  ctx.stroke();

  const mid = h * 0.5;
  const peaks = waveform.peaks;
  const audioDur = waveform.duration;
  // gradient fill mirrored
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(106, 134, 216, 0.95)');
  grad.addColorStop(0.5, 'rgba(136, 216, 163, 0.85)');
  grad.addColorStop(1, 'rgba(106, 134, 216, 0.95)');
  ctx.fillStyle = grad;
  const viewStart = viewStartTime();
  const viewVis = viewVisibleDuration();
  for (let x = 0; x < w; x++) {
    const t = viewStart + (x / Math.max(1, w)) * viewVis;
    if (t < 0 || t > audioDur) continue;
    const idx = Math.min(peaks.length - 1, Math.max(0, Math.floor((t / audioDur) * peaks.length)));
    const amp = clamp(peaks[idx] || 0, 0, 1);
    const y = Math.max(1, amp * (mid - 1));
    ctx.fillRect(x, mid - y, 1, y * 2);
  }
}

function updateTimelineVisuals() {
  playhead.style.left = timeToPct(state.play.time).toFixed(3) + '%';
  if (loopRangeEl) {
    const left = timeToPct(state.comp.inPoint);
    const right = timeToPct(state.comp.outPoint);
    loopRangeEl.style.left = left.toFixed(3) + '%';
    loopRangeEl.style.width = Math.max(0, right - left).toFixed(3) + '%';
  }
  if (inMarkerEl) inMarkerEl.style.left = timeToPct(state.comp.inPoint).toFixed(3) + '%';
  if (outMarkerEl) outMarkerEl.style.left = timeToPct(state.comp.outPoint).toFixed(3) + '%';
  updateListPlayhead();
  updatePreviewSeekUI();
  updateZoomScrollbarUI();
}

function updateListPlayhead() {
  const list = document.getElementById('timelineList');
  if (!list) return;
  let ph = list.querySelector('.list-playhead');
  if (!ph) {
    ph = document.createElement('div');
    ph.className = 'list-playhead';
    list.appendChild(ph);
  }
  const offsetStr = getComputedStyle(document.documentElement).getPropertyValue('--track-offset').trim();
  const offset = parseFloat(offsetStr) || 0;
  const cs = getComputedStyle(list);
  const padL = parseFloat(cs.paddingLeft) || 0;
  const padR = parseFloat(cs.paddingRight) || 0;
  const w = list.clientWidth - padL - padR;
  const trackW = Math.max(1, w - offset);
  const pct = timeToPct(state.play.time) / 100;
  const left = padL + offset + pct * trackW;
  ph.style.left = left + 'px';
  ph.style.display = (pct < 0 || pct > 1) ? 'none' : 'block';
}

function setDuration(v) {
  const duration = clamp(parseFloat(v) || state.comp.duration, 4, 60);
  state.comp.duration = duration;
  state.comp.inPoint = clamp(state.comp.inPoint, 0, duration - 1 / 60);
  state.comp.outPoint = clamp(state.comp.outPoint, state.comp.inPoint + 1 / 60, duration);
  normalizeAllLayerClips();
  setTimelineTime(state.play.time);
  syncTimelineControls();
  rebuildTimelineRuler();
  refreshFxUI();
}

function setInPoint(v) {
  const minGap = 1 / 60;
  state.comp.inPoint = clamp(parseFloat(v) || 0, 0, state.comp.duration - minGap);
  if (state.comp.outPoint <= state.comp.inPoint + minGap) {
    state.comp.outPoint = clamp(state.comp.inPoint + minGap, minGap, state.comp.duration);
  }
  syncTimelineControls();
  rebuildTimelineRuler();
  refreshFxUI();
}

function setOutPoint(v) {
  const minGap = 1 / 60;
  state.comp.outPoint = clamp(parseFloat(v) || state.comp.duration, state.comp.inPoint + minGap, state.comp.duration);
  syncTimelineControls();
  rebuildTimelineRuler();
  refreshFxUI();
}

function togglePlayback() {
  if (!state.play.playing && (state.play.time >= state.comp.outPoint || state.play.time < state.comp.inPoint)) {
    setTimelineTime(state.comp.inPoint);
  }
  state.play.playing = !state.play.playing;
  state.play.lastWall = performance.now() / 1000;
  updateTransportButtons();
}

function timeFromRulerEvent(e) {
  const ref = e.currentTarget && e.currentTarget.getBoundingClientRect ? e.currentTarget : timelineRuler;
  const rect = ref.getBoundingClientRect();
  const x = clamp(e.clientX - rect.left, 0, rect.width);
  return pctToTime(x / Math.max(1, rect.width) * 100);
}

function updateSceneControls() {
  state.activeScene = state.activeScene === 1 ? 1 : 0;
  state.crossfader = clamp(state.crossfader, 0, 1);
  sceneABtn.classList.toggle('toggle-on', state.activeScene === 0);
  sceneBBtn.classList.toggle('toggle-on', state.activeScene === 1);
  crossfaderInput.value = state.crossfader;
}

function setActiveScene(idx) {
  state.activeScene = idx === 1 ? 1 : 0;
  state.selectedKey = null;
  ensureSelectedLayer();
  updateSceneControls();
  refreshFxUI();
}

function setCrossfader(v) {
  state.crossfader = clamp(parseFloat(v) || 0, 0, 1);
  updateSceneControls();
  updateFxStatus();
}

playBtn.addEventListener('click', togglePlayback);
rewindBtn.addEventListener('click', () => setTimelineTime(0));
loopBtn.addEventListener('click', () => {
  state.comp.loop = !state.comp.loop;
  updateTransportButtons();
});
undoBtn.addEventListener('click', undo);
redoBtn.addEventListener('click', redo);
sceneABtn.addEventListener('click', () => setActiveScene(0));
sceneBBtn.addEventListener('click', () => setActiveScene(1));
crossfaderInput.addEventListener('input', e => setCrossfader(e.target.value));
durationInput.addEventListener('change', e => runCommand('Change duration', () => setDuration(e.target.value)));
timeModeSelect.addEventListener('change', e => {
  runCommand('Change time mode', () => {
    state.comp.timeMode = e.target.value;
    syncTimelineControls();

  });
});
snapSelect.addEventListener('change', e => {
  runCommand('Change snap', () => {

});
inPointInput.addEventListener('change', e => runCommand('Set In point', () => setInPoint(e.target.value)));
outPointInput.addEventListener('change', e => runCommand('Set Out point', () => setOutPoint(e.target.value)));

let rulerDragging = false;
timelineRuler.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  rulerDragging = true;
  timelineRuler.setPointerCapture(e.pointerId);
  state.play.playing = false;
  setTimelineTime(timeFromRulerEvent(e), {snap:true});
  updateTransportButtons();
});
timelineRuler.addEventListener('pointermove', e => {
  if (rulerDragging) setTimelineTime(timeFromRulerEvent(e), {snap:true});
});
timelineRuler.addEventListener('pointerup', e => {
  rulerDragging = false;
  try { timelineRuler.releasePointerCapture(e.pointerId); } catch (err) {}
});

const timelineWaveEl = document.getElementById('timelineWave');
let waveDragging = false;
timelineWaveEl.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  waveDragging = true;
  timelineWaveEl.setPointerCapture(e.pointerId);
  state.play.playing = false;

// Zoom + scroll wiring
const thTrackEl = document.getElementById('thTrack');
const zoomReadoutEl = document.getElementById('zoomReadout');
const sbTrackEl = document.getElementById('sbTrack');
const sbThumbEl = document.getElementById('sbThumb');

function updateZoomScrollbarUI() {
  if (zoomReadoutEl) zoomReadoutEl.textContent = 'x' + (state.view.zoom || 1).toFixed(1);
  if (sbThumbEl && sbTrackEl) {
    const z = state.view.zoom || 1;
    const w = sbTrackEl.clientWidth;
    const thumbW = Math.max(18, w / z);
    const left = state.view.scroll * Math.max(0, w - thumbW);
    sbThumbEl.style.width = thumbW + 'px';
    sbThumbEl.style.left = left + 'px';
  }
}

function repaintTimelineAfterView() {
  rebuildTimelineRuler();
  buildTimeline();
}

function applyZoom(deltaSign, anchorTime) {
  const oldZoom = state.view.zoom || 1;
  const factor = deltaSign > 0 ? 1.25 : 1 / 1.25;
  setViewZoom(oldZoom * factor, anchorTime);
  repaintTimelineAfterView();
}

function timeFromTrackEvent(e) {
  const rect = thTrackEl.getBoundingClientRect();
  const x = clamp(e.clientX - rect.left, 0, rect.width);
  return pctToTime(x / Math.max(1, rect.width) * 100);
}

[thTrackEl, document.getElementById('timelineList')].forEach(target => {
  if (!target) return;
  target.addEventListener('wheel', e => {
    if (e.ctrlKey) {
      e.preventDefault();
      const anchor = timeFromTrackEvent(e);
      applyZoom(-Math.sign(e.deltaY), anchor);

function updateFrequencyTrigger(dt) {
  const a = state.audio;
  const buf = a.buf;
  if (!a.analyser || !buf || !buf.length) {
    a.freqLevel *= 0.92;
    a.freqGate = false;
    a.triggerEnv *= Math.exp(-dt / Math.max(0.03, a.triggerDecay));
    return;
  }
  const sampleRate = a.ctx ? a.ctx.sampleRate : 44100;
  const binHz = (sampleRate * 0.5) / buf.length;
  const halfWidth = Math.max(5, a.freqWidth * 0.5);
  const from = Math.max(0, Math.floor((a.freq - halfWidth) / binHz));
  const to = Math.min(buf.length - 1, Math.ceil((a.freq + halfWidth) / binHz));
  let sum = 0;
  for (let i = from; i <= to; i++) sum += buf[i];
  const bins = Math.max(1, to - from + 1);
  a.freqLevel = Math.min(1, (sum / bins / 255) * a.gain);

  const prevGate = a.freqGate;
  const nextGate = a.freqLevel >= a.freqThreshold;
  const rose = !prevGate && nextGate;
  const fell = prevGate && !nextGate;
  const edge = a.freqEdge;
  if ((edge === 'rise' && rose) || (edge === 'fall' && fell) || (edge === 'both' && (rose || fell))) {
    a.triggerEnv = 1;
  } else {
    a.triggerEnv *= Math.exp(-dt / Math.max(0.03, a.triggerDecay));
  }
  a.prevFreqGate = prevGate;
  a.freqGate = nextGate;
}
function updateLayerFftTrigger(layer, dt) {
  const cfg = layer.fft;
  if (!cfg) return;
  const a = state.audio;
  const buf = a.buf;
  if (!a.analyser || !buf || !buf.length) {
    cfg._level = (cfg._level || 0) * 0.92;
    cfg._gate = false;
    cfg._env = (cfg._env || 0) * Math.exp(-dt / 0.18);
    return;
  }
  const sampleRate = a.ctx ? a.ctx.sampleRate : 44100;
  const binHz = (sampleRate * 0.5) / buf.length;
  const halfWidth = Math.max(5, cfg.width * 0.5);
  const from = Math.max(0, Math.floor((cfg.freq - halfWidth) / binHz));
  const to = Math.min(buf.length - 1, Math.ceil((cfg.freq + halfWidth) / binHz));
  let sum = 0;
  for (let i = from; i <= to; i++) sum += buf[i];
  const bins = Math.max(1, to - from + 1);
  cfg._level = Math.min(1, (sum / bins / 255) * (cfg.gain || a.gain));
  const prevGate = cfg._gate;
  const nextGate = cfg._level >= cfg.threshold;
  const rose = !prevGate && nextGate;
  const fell = prevGate && !nextGate;
  if ((cfg.edge === 'rise' && rose) || (cfg.edge === 'fall' && fell) || (cfg.edge === 'both' && (rose || fell))) {
    cfg._env = 1;
  } else {
    cfg._env = (cfg._env || 0) * Math.exp(-dt / 0.18);
  }
  cfg._prevGate = prevGate;
  cfg._gate = nextGate;
}
function pollAudio() {
  const now = performance.now() / 1000;
  const dt = Math.max(1 / 120, Math.min(0.25, now - state.audio.lastPoll));
  state.audio.lastPoll = now;
  if (state.audio.analyser) {
    state.audio.analyser.getByteFrequencyData(state.audio.buf);
    let sum = 0;
    for (let i = 0; i < state.audio.buf.length; i++) sum += state.audio.buf[i];
    const avg = sum / state.audio.buf.length / 255;
    state.audio.level = Math.min(1, avg * state.audio.gain);
  } else {
    state.audio.level *= 0.95;
  }
  updateFrequencyTrigger(dt);
  state.scenes.forEach(scene => scene.layers.forEach(layer => updateLayerFftTrigger(layer, dt)));
  fftBandBar.value = state.audio.freqLevel;
  fftTriggerBar.value = state.audio.triggerEnv;
  fftGateState.textContent = state.audio.freqGate ? 'on' : 'off';
  requestAnimationFrame(pollAudio);
}

async function analyzeAudioWaveform(file) {
  try {
    const buf = await file.arrayBuffer();
    const decoded = await state.audio.ctx.decodeAudioData(buf.slice(0));
    const peaks = buildAudioPeaks(decoded, 900);
    state.audio.waveform = {peaks, duration: decoded.duration, name: file.name};
    rebuildTimelineRuler();
    refreshFxUI();
  } catch (err) {
    state.audio.waveform = null;
    rebuildTimelineRuler();
  }
}
function buildAudioPeaks(buffer, count) {
  const channels = [];
  for (let ch = 0; ch < buffer.numberOfChannels; ch++) channels.push(buffer.getChannelData(ch));
  const len = buffer.length;
  const peaks = [];
  for (let i = 0; i < count; i++) {
    const from = Math.floor(i / count * len);
    const to = Math.max(from + 1, Math.floor((i + 1) / count * len));
    let max = 0;
    for (let ch = 0; ch < channels.length; ch++) {
      const data = channels[ch];
      for (let j = from; j < to; j++) {
        const v = Math.abs(data[j] || 0);
        if (v > max) max = v;
      }
    }
    peaks.push(max);
  }
  const norm = Math.max(0.001, peaks.reduce((m, v) => Math.max(m, v), 0));
  return peaks.map(v => v / norm);
}

function parseMidiMessage(message) {
  const [status, data1, data2] = message.data;
  const cmd = status & 0xf0;
  const channel = status & 0x0f;
  if (cmd === 0xb0) return {type:'cc', channel, num:data1, value:data2};
  if (cmd === 0x90 && data2 > 0) return {type:'note', channel, num:data1, value:data2};
  if (cmd === 0x80 || (cmd === 0x90 && data2 === 0)) return {type:'noteOff', channel, num:data1, value:0};
  return null;
}
function handleMidiMessage(message) {
  if (!state.midi.enabled) return;
  const msg = parseMidiMessage(message);
  if (!msg || msg.type === 'noteOff') return;
  if (state.midi.learnTarget) {
    learnMidiBinding(msg);
    return;
  }
  state.midi.bindings.forEach(binding => {
    if (binding.type === msg.type && binding.channel === msg.channel && binding.num === msg.num) {
      applyMidiBinding(binding, msg.value);
    }
  });
}
function learnMidiBinding(msg) {
  const target = state.midi.learnTarget;
  runCommand('Add MIDI binding', () => {
    state.midi.bindings = state.midi.bindings.filter(binding =>
      !(binding.type === msg.type && binding.channel === msg.channel && binding.num === msg.num &&
        binding.lid === target.lid && binding.kind === target.kind && binding.paramKey === target.paramKey)
    );
    state.midi.bindings.push({
      id: state.midi.nextBindingId++,
      type: msg.type,
      channel: msg.channel,
      num: msg.num,
      kind: target.kind,
      lid: target.lid,
      paramKey: target.paramKey || null

    state.midi.learnTarget = null;
    refreshMidiUI();
  });
}
function paramDefForLayer(layer, paramKey) {

}
function valueToHex(v) {
  const hue = clamp(v, 0, 1);
  const rgb = hsv2rgbForUI(hue, 0.95, 1);

}
function hsv2rgbForUI(h, s, v) {
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t = v * (1 - (1 - f) * s);
  const m = i % 6;
  if (m === 0) return [v, t, p];
  if (m === 1) return [q, v, p];
  if (m === 2) return [p, v, t];
  if (m === 3) return [p, q, v];
  if (m === 4) return [t, p, v];
  return [v, p, q];
}
let midiRefreshQueued = false;
function scheduleMidiRefresh() {

}
function applyMidiBinding(binding, rawValue) {

    else layer.enabled = rawValue >= 64;

  }
  if (binding.kind === 'key') {

  }

function defaultValuesFor(def) {

const BASE_PARAM_DEFS = [

function paramDefsFor(def) {

    label: x.label,

function defaultLayerFft() {

  base.width = clamp(parseFloat(fft.width) || base.width, 10, 2000);
  base.threshold = clamp(parseFloat(fft.threshold) ?? base.threshold, 0, 1);

    effId,
    enabled: !!opts.enabled,
    open: opts.open !== undefined ? !!opts.open : true,
    start: clip.start,
    end: clip.end,
    values: defaultValuesFor(def),
    keyframes: {},

    const idx = state.layers.findIndex(layer => layer.lid === lid);
    if (idx < 0) return;
    state.layers.splice(idx, 1);
    if (state.selectedKey?.lid === lid) state.selectedKey = null;
    state.selectedLayerId = state.layers[Math.min(idx, state.layers.length - 1)]?.lid || null;
    refreshFxUI();
  });
}
function moveLayer(lid, delta) {
  runCommand('Move layer', () => {
    const idx = state.layers.findIndex(layer => layer.lid === lid);
    const next = idx + delta;
    if (idx < 0 || next < 0 || next >= state.layers.length) return;
    [state.layers[idx], state.layers[next]] = [state.layers[next], state.layers[idx]];
    refreshFxUI();
  });
}
function toggleLayer(lid, enabled) {
  runCommand('Toggle layer', () => {
    const layer = layerState(lid);
    const def = layer && effectDef(layer.effId);
    if (!layer || !def) return;
    layer.enabled = enabled;
    if (layer.enabled && def.st !== 'mon') getProg(def);
    state.selectedLayerId = lid;
    refreshFxUI();
  });
}
function toggleLayerOpen(lid) {
  const layer = layerState(lid);
  if (!layer) return;
  layer.open = !layer.open;
  state.selectedLayerId = lid;
  refreshFxUI();
}
function selectKey(lid, paramKey, idx) {
  state.selectedLayerId = lid;
  state.selectedKey = {lid, paramKey, idx};
  refreshFxUI();
}
function addKeyframe(lid, paramKey) {
  runCommand('Add keyframe', () => {
    const layer = layerState(lid);
    if (!layer) return;
    const value = evaluateLayerValues(layer, state.play.time)[paramKey] ?? layer.values[paramKey];
    if (!layer.keyframes[paramKey]) layer.keyframes[paramKey] = [];
    const keys = layer.keyframes[paramKey];
    const t = snapTime(state.play.time);
    const existing = keys.findIndex(k => Math.abs(k.t - t) < 1 / 120);
    if (existing >= 0) keys[existing].v = value;
    else keys.push({t, v: value});
    sortedKeyframes(layer, paramKey);
    const idx = keys.findIndex(k => Math.abs(k.t - t) < 1 / 120);
    state.selectedKey = {lid, paramKey, idx};
    state.selectedLayerId = lid;
    refreshFxUI();
  });
}
function deleteSelectedKey() {
  runCommand('Delete keyframe', () => {
    const sel = state.selectedKey;
    const layer = sel && layerState(sel.lid);
    const keys = layer && layer.keyframes[sel.paramKey];
    if (!keys || !keys[sel.idx]) return;
    keys.splice(sel.idx, 1);
    if (!keys.length) delete layer.keyframes[sel.paramKey];
    state.selectedKey = null;
    refreshFxUI();
  });
}
function moveKey(lid, paramKey, idx, t, refresh = true) {
  const layer = layerState(lid);
  const keys = layer && layer.keyframes[paramKey];
  if (!keys || !keys[idx]) return;
  const key = keys[idx];
  key.t = clamp(snapTime(t), 0, state.comp.duration);
  if (refresh) sortedKeyframes(layer, paramKey);
  const nextIdx = keys.indexOf(key);
  state.selectedKey = {lid, paramKey, idx: Math.max(0, Math.min(keys.length - 1, nextIdx))};
  if (refresh) refreshFxUI();
}
function copySelectedKey() {
  const sel = state.selectedKey;
  const layer = sel && layerState(sel.lid);
  const key = layer && layer.keyframes[sel.paramKey]?.[sel.idx];
  if (!key) return;
  state.keyClipboard = {paramKey: sel.paramKey, v: key.v};
}
function pasteKeyClipboard() {
  runCommand('Paste keyframe', () => {
    if (!state.keyClipboard || !state.selectedLayerId) return;
    const layer = layerState(state.selectedLayerId);
    if (!layer) return;
    const paramKey = state.keyClipboard.paramKey;
    if (!(paramKey in layer.values)) return;
    if (!layer.keyframes[paramKey]) layer.keyframes[paramKey] = [];
    const t = snapTime(state.play.time);
    layer.keyframes[paramKey].push({t, v: state.keyClipboard.v});
    sortedKeyframes(layer, paramKey);
    const idx = layer.keyframes[paramKey].findIndex(k => Math.abs(k.t - t) < 1 / 120);
    state.selectedKey = {lid: layer.lid, paramKey, idx};
    refreshFxUI();
  });
}
function scheduleParamHistory(label, before) {
  if (!state.pendingParamHistory) {
    state.pendingParamHistory = {label, before, timer: null};
  }
  clearTimeout(state.pendingParamHistory.timer);
  state.pendingParamHistory.timer = setTimeout(() => {
    const pending = state.pendingParamHistory;
    state.pendingParamHistory = null;
    pushHistory(pending.label, pending.before);
  }, 250);
}
function randomParamValue(param) {
  if (param.type === 'color') {
    return '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
  }
  const min = param.min ?? 0;
  const max = param.max ?? 1;
  return min + Math.random() * (max - min);
}
function randomizeLayerKeyframes(layer, def) {
  const params = paramDefsFor(def).filter(p => p.type !== 'color');
  const count = 2 + Math.floor(Math.random() * 3);
  const chosen = params
    .sort(() => Math.random() - 0.5)
    .slice(0, Math.min(params.length, 2 + Math.floor(Math.random() * 3)));
  chosen.forEach(param => {
    layer.keyframes[param.key] = [];
    for (let i = 0; i < count; i++) {
      layer.keyframes[param.key].push({
        t: Math.random() * state.comp.duration,
        v: randomParamValue(param)
      });
    }
    sortedKeyframes(layer, param.key);
  });
}
function refreshFxUI() {
  ensureSelectedLayer();
  effectList.innerHTML = '';
  buildEffectList();
  buildInspector();
  buildTimeline();
  updateFxStatus();
}

function buildTimeline() {
  timelineList.innerHTML = '';
  if (!state.layers.length) {
    timelineList.innerHTML = '<div class="empty">レイヤーはまだありません。左パネルの＋で追加します。</div>';
    return;
  }
  state.layers.forEach((layer, idx) => {
    const def = effectDef(layer.effId);
    if (!def) return;
    normalizeLayerClip(layer);
    const inPct = timeToPct(layer.start);
    const outPct = timeToPct(layer.end);
    const row = document.createElement('div');
    row.className = 'lane-row' +
      (layer.enabled ? ' on' : '') +
      (state.selectedLayerId === layer.lid ? ' selected' : '');
    row.innerHTML = `
      <div class="lane-controls">
        <span class="num">${String(idx + 1).padStart(2,'0')}</span>
        <button class="mvbtn" data-act="open">${layer.open ? '▼' : '▶'}</button>
        <input type="checkbox" ${layer.enabled?'checked':''} aria-label="${def.name} 有効">
        <span class="lane-name">${def.name}</span>
        <button class="mvbtn" data-act="up">▲</button>
        <button class="mvbtn" data-act="down">▼</button>
      </div>
      <div class="lane-track">
        <div class="lane-bar" data-lid="${layer.lid}" style="left:${inPct.toFixed(3)}%;width:${Math.max(0, outPct - inPct).toFixed(3)}%;">
          <button class="clip-handle start" data-edge="start" aria-label="clip start"></button>

      e.stopPropagation();

    });

      e.stopPropagation();
      moveLayer(layer.lid, -1);
    });
