function renderLayerKeys(layer) {
  const keys = [];
  Object.keys(layer.keyframes || {}).forEach(paramKey => {
    sortedKeyframes(layer, paramKey).forEach((key, idx) => {
      const selected = state.selectedKey &&
        state.selectedKey.lid === layer.lid &&
        state.selectedKey.paramKey === paramKey &&
        state.selectedKey.idx === idx;
      keys.push(`<button class="key-marker ${selected ? 'selected' : ''}" data-lid="${layer.lid}" data-param="${paramKey}" data-idx="${idx}" style="left:${timeToPct(key.t).toFixed(3)}%"></button>`);
    });
  });
  return keys.join('');
}

function updateClipBarStyle(bar, layer) {
  normalizeLayerClip(layer);
  const left = timeToPct(layer.start);
  const right = timeToPct(layer.end);
  bar.style.left = left.toFixed(3) + '%';
  bar.style.width = Math.max(0, right - left).toFixed(3) + '%';
}

function setLayerClip(layer, start, end) {
  const clip = normalizeClip(start, end);
  layer.start = clip.start;
  layer.end = clip.end;
}

function setupClipDrag(bar) {
  if (!bar) return;
  bar.addEventListener('click', e => {
    e.stopPropagation();
    selectLayer(bar.dataset.lid);
  });
  bar.addEventListener('pointerdown', e => {
    e.stopPropagation();
    const layer = layerState(bar.dataset.lid);
    if (!layer) return;
    normalizeLayerClip(layer);
    const before = snapshotState();
    const track = bar.closest('.lane-track');
    const mode = e.target.dataset.edge || 'move';
    const startX = e.clientX;
    const initialStart = layer.start;
    const initialEnd = layer.end;
    const initialLen = initialEnd - initialStart;
    const minLen = 1 / 30;
    state.selectedLayerId = layer.lid;
    state.selectedKey = null;
    bar.setPointerCapture(e.pointerId);
    const move = ev => {
      const rect = track.getBoundingClientRect();
      const dx = (ev.clientX - startX) / Math.max(1, rect.width) * viewVisibleDuration();
      if (mode === 'start') {
        const nextStart = clamp(snapTime(initialStart + dx), 0, initialEnd - minLen);
        setLayerClip(layer, nextStart, initialEnd);
      } else if (mode === 'end') {
        const nextEnd = clamp(snapTime(initialEnd + dx), initialStart + minLen, state.comp.duration);
        setLayerClip(layer, initialStart, nextEnd);
      } else {
        const snappedStart = snapTime(initialStart + dx);
        const nextStart = clamp(snappedStart, 0, state.comp.duration - initialLen);
        setLayerClip(layer, nextStart, nextStart + initialLen);
      }
      updateClipBarStyle(bar, layer);
    };
    const up = ev => {
      try { bar.releasePointerCapture(ev.pointerId); } catch (err) {}
      bar.removeEventListener('pointermove', move);
      bar.removeEventListener('pointerup', up);
      pushHistory('Change clip range', before);
      refreshFxUI();
    };
    bar.addEventListener('pointermove', move);
    bar.addEventListener('pointerup', up);
  });
}

function buildParamRows(layer, def) {
  paramDefsFor(def).forEach(param => {
    const keys = sortedKeyframes(layer, param.key);
    const graphable = param.type !== 'color';
    const graph = graphable && !!state.graphOpen[graphKey(layer.lid, param.key)];
    const row = document.createElement('div');
    row.className = 'lane-row param' + (graph ? ' graph' : '') + (state.selectedLayerId === layer.lid ? ' selected' : '');
    row.innerHTML = `
      <div class="lane-controls">
        <span class="num">${String(keys.length).padStart(2,'0')}</span>
        <span class="lane-name">${param.label}</span>
        <button class="mvbtn" data-act="add-key">◆</button>
        ${graphable ? `<button class="mvbtn" data-act="graph">${graph ? 'G*' : 'G'}</button>` : '<span class="num"></span>'}
      </div>
      <div class="lane-track">${graph ? renderGraphTrack(layer, param, keys) : keys.map((key, idx) => {
        const selected = state.selectedKey &&
          state.selectedKey.lid === layer.lid &&
          state.selectedKey.paramKey === param.key &&
          state.selectedKey.idx === idx;
        return `<button class="key-marker ${selected ? 'selected' : ''}" data-lid="${layer.lid}" data-param="${param.key}" data-idx="${idx}" style="left:${timeToPct(key.t).toFixed(3)}%"></button>`;
      }).join('')}</div>
    `;
    row.querySelector('[data-act=add-key]').addEventListener('click', e => {
      e.stopPropagation();
      addKeyframe(layer.lid, param.key);
    });
    const graphBtn = row.querySelector('[data-act=graph]');
    if (graphBtn) graphBtn.addEventListener('click', e => {
      e.stopPropagation();
      const key = graphKey(layer.lid, param.key);
      state.graphOpen[key] = !state.graphOpen[key];
      refreshFxUI();
    });
    timelineList.appendChild(row);
    if (graph) {
      const canvas = row.querySelector('.graph-canvas');
      requestAnimationFrame(() => drawGraphCanvas(canvas, layer, param));
      row.querySelectorAll('.graph-point').forEach(point => setupGraphPoint(point, param));
    } else {
      row.querySelectorAll('.key-marker').forEach(marker => setupKeyMarker(marker));
    }
  });
}

function graphKey(lid, paramKey) {
  return `${lid}:${paramKey}`;
}
function renderGraphTrack(layer, param, keys) {
  const points = keys.map((key, idx) => {
    const pos = graphPointPosition(param, key);
    const selected = state.selectedKey &&
      state.selectedKey.lid === layer.lid &&
      state.selectedKey.paramKey === param.key &&
      state.selectedKey.idx === idx;
    return `<button class="graph-point ${selected ? 'selected' : ''}" data-lid="${layer.lid}" data-param="${param.key}" data-idx="${idx}" style="left:${pos.x.toFixed(3)}%;top:${pos.y.toFixed(3)}%"></button>`;
  }).join('');
  return `<canvas class="graph-canvas" data-lid="${layer.lid}" data-param="${param.key}"></canvas>${points}`;
}
function graphPointPosition(param, key) {
  const min = param.min ?? 0;
  const max = param.max ?? 1;
  const norm = max === min ? 0 : clamp((parseFloat(key.v) - min) / (max - min), 0, 1);
  return {
    x: timeToPct(key.t),
    y: (1 - norm) * 100
  };
}
function drawGraphCanvas(canvas, layer, param) {
  if (!canvas) return;
  const keys = sortedKeyframes(layer, param.key);
  const rect = canvas.getBoundingClientRect();
  const w = Math.max(1, Math.floor(rect.width * devicePixelRatio));
  const h = Math.max(1, Math.floor(rect.height * devicePixelRatio));
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = '#2a3341';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h * 0.5);
  ctx.lineTo(w, h * 0.5);
  ctx.stroke();
  if (!keys.length) return;
  ctx.strokeStyle = '#88d8a3';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const viewStart = viewStartTime();
  const viewVis = viewVisibleDuration();
  for (let x = 0; x <= w; x++) {
    const t = viewStart + (x / Math.max(1, w)) * viewVis;
    const v = sampleKeyframes(layer.values[param.key], keys, t);
    const pos = graphPointPosition(param, {t, v});
    const y = pos.y / 100 * h;
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
}
function setupGraphPoint(point, param) {
  point.addEventListener('click', e => {
    e.stopPropagation();
    selectKey(point.dataset.lid, point.dataset.param, parseInt(point.dataset.idx, 10));
  });
  point.addEventListener('pointerdown', e => {
    e.stopPropagation();
    const before = snapshotState();
    const track = point.closest('.lane-track');
    point.setPointerCapture(e.pointerId);
    state.selectedLayerId = point.dataset.lid;
    state.selectedKey = {
      lid: point.dataset.lid,
      paramKey: point.dataset.param,
      idx: parseInt(point.dataset.idx, 10)
    };
    const move = ev => {
      const layer = layerState(point.dataset.lid);
      const keys = layer && layer.keyframes[point.dataset.param];
      const key = keys && keys[parseInt(point.dataset.idx, 10)];
      if (!key) return;
      const rect = track.getBoundingClientRect();
      const x = clamp(ev.clientX - rect.left, 0, rect.width);
      const y = clamp(ev.clientY - rect.top, 0, rect.height);
      key.t = clamp(snapTime(pctToTime(x / Math.max(1, rect.width) * 100)), 0, state.comp.duration);
      const min = param.min ?? 0;
      const max = param.max ?? 1;
      key.v = min + (1 - y / Math.max(1, rect.height)) * (max - min);
      const pos = graphPointPosition(param, key);
      point.style.left = pos.x.toFixed(3) + '%';
      point.style.top = pos.y.toFixed(3) + '%';
      drawGraphCanvas(track.querySelector('.graph-canvas'), layer, param);
    };
    const up = ev => {
      try { point.releasePointerCapture(ev.pointerId); } catch (err) {}
      point.removeEventListener('pointermove', move);
      point.removeEventListener('pointerup', up);
      const layer = layerState(point.dataset.lid);
      if (layer) sortedKeyframes(layer, point.dataset.param);
      pushHistory('Move graph key', before);
      refreshFxUI();
    };
    point.addEventListener('pointermove', move);
    point.addEventListener('pointerup', up);
  });
}

function setupKeyMarker(marker) {
  marker.addEventListener('click', e => {
    e.stopPropagation();
    selectKey(marker.dataset.lid, marker.dataset.param, parseInt(marker.dataset.idx, 10));
  });
  marker.addEventListener('pointerdown', e => {
    e.stopPropagation();
    const before = snapshotState();
    marker.setPointerCapture(e.pointerId);
    state.selectedLayerId = marker.dataset.lid;
    state.selectedKey = {
      lid: marker.dataset.lid,
      paramKey: marker.dataset.param,
      idx: parseInt(marker.dataset.idx, 10)
    };
    marker.classList.add('selected');
    const track = marker.closest('.lane-track');
    const move = ev => {
      const rect = track.getBoundingClientRect();
      const x = clamp(ev.clientX - rect.left, 0, rect.width);
      const t = pctToTime(x / Math.max(1, rect.width) * 100);
      moveKey(marker.dataset.lid, marker.dataset.param, parseInt(marker.dataset.idx, 10), t, false);
      const layer = layerState(marker.dataset.lid);
      const key = layer?.keyframes[marker.dataset.param]?.[parseInt(marker.dataset.idx, 10)];
      if (key) marker.style.left = timeToPct(key.t).toFixed(3) + '%';
    };
    const up = ev => {
      try { marker.releasePointerCapture(ev.pointerId); } catch (err) {}
      marker.removeEventListener('pointermove', move);
      marker.removeEventListener('pointerup', up);
      const layer = layerState(marker.dataset.lid);
      if (layer) sortedKeyframes(layer, marker.dataset.param);
      pushHistory('Move keyframe', before);
      refreshFxUI();
    };
    marker.addEventListener('pointermove', move);
    marker.addEventListener('pointerup', up);
  });
}

function buildEffectBody(body, layer, def) {
  body.innerHTML = '';
  BASE_PARAM_DEFS.forEach(p => body.appendChild(makeRange(layer, p)));
  body.appendChild(makeLayerInOutPanel(layer));
  body.appendChild(makeLayerFftPanel(layer));
  if (def.extras && def.extras.length) {
    const hr = document.createElement('hr'); body.appendChild(hr);
    def.extras.forEach(x => {
      if (x.type === 'color') body.appendChild(makeColor(layer, x));
      else body.appendChild(makeRange(layer, {key:x.key, label:x.label, min:x.min, max:x.max, step:0.001}));
    });
  }
  if (def.id === 'audiobpm') {
    const note = document.createElement('div');
    note.className = 'note';
    note.textContent = '※ このスロットは状態表示用。各効果の bpmSync / audio スライダで個別に同期させてください。';
    body.appendChild(note);
  }
}

    <div class="sub-panel-head">FFT trigger (per-layer)</div>

    <div class="row"><label>copy</label>
      <button class="mvbtn" data-fft-act="from-global">← global</button>
      <button class="mvbtn" data-fft-act="to-global">→ global</button></div>
  `;
  const setNum = (key, raw, fmt) => {
    let val = parseFloat(raw);
    if (key === 'freq') val = clamp(val || 80, 20, 16000);
    else if (key === 'width') val = clamp(val || 90, 10, 2000);
    else if (key === 'threshold') val = clamp(val || 0, 0, 1);
    else if (key === 'gain') val = clamp(val || 1, 0.1, 8);
    layer.fft[key] = val;
    const disp = panel.querySelector(`[data-fft-disp="${key}"]`);
    if (disp) disp.textContent = fmt(val);
  };
  panel.querySelectorAll('[data-fft]').forEach(el => {
    const key = el.dataset.fft;
    let before = null;
    if (el.tagName === 'SELECT') {
      el.addEventListener('change', () => {
        const snap = snapshotState();
        layer.fft.edge = el.value;
        pushHistory('Change layer FFT edge', snap);
      });
    } else {
      el.addEventListener('pointerdown', () => { before = snapshotState(); });
      el.addEventListener('focus', () => { before = snapshotState(); });
      el.addEventListener('pointerup', () => setTimeout(() => { before = null; }, 300));
      el.addEventListener('blur', () => setTimeout(() => { before = null; }, 300));
      el.addEventListener('input', () => {
        if (!before) before = snapshotState();
        if (key === 'freq') setNum(key, el.value, v => `${Math.round(v)} Hz`);
        else if (key === 'width') setNum(key, el.value, v => `${Math.round(v)} Hz`);
        else if (key === 'threshold') setNum(key, el.value, v => v.toFixed(2));
        else if (key === 'gain') setNum(key, el.value, v => `x${v.toFixed(2)}`);
        scheduleParamHistory('Change layer FFT', before);
      });
      el.addEventListener('change', () => {
        if (key === 'freq') setNum(key, el.value, v => { el.value = Math.round(v); return `${Math.round(v)} Hz`; });
        else if (key === 'width') setNum(key, el.value, v => { el.value = Math.round(v); return `${Math.round(v)} Hz`; });
      });
    }
  });
  panel.querySelector('[data-fft-act="from-global"]').addEventListener('click', () => {
    runCommand('Copy global FFT to layer', () => {
      layer.fft = normalizeLayerFft({
        freq: state.audio.freq, width: state.audio.freqWidth,
        threshold: state.audio.freqThreshold, edge: state.audio.freqEdge,
        gain: state.audio.gain
      });
      refreshFxUI();
    });
  });
  panel.querySelector('[data-fft-act="to-global"]').addEventListener('click', () => {
    runCommand('Copy layer FFT to global', () => {
      state.audio.freq = layer.fft.freq;
      state.audio.freqWidth = layer.fft.width;
      state.audio.freqThreshold = layer.fft.threshold;
      state.audio.freqEdge = layer.fft.edge;
      state.audio.gain = layer.fft.gain;
      syncGlobalFftUI();
    });
  });
  return panel;
}

function setParamValueAtPlayhead(layer, paramKey, value) {
  const keys = layer.keyframes && layer.keyframes[paramKey];
  if (keys && keys.length) {
    const t = snapTime(state.play.time);
    const tol = 1 / 120;
    const existing = keys.findIndex(k => Math.abs(k.t - t) < tol);
    if (existing >= 0) {
      keys[existing].v = value;
    } else {
      keys.push({t, v: value});
      sortedKeyframes(layer, paramKey);
    }
    layer.values[paramKey] = value;
    return true;
  }
  layer.values[paramKey] = value;
  return false;
}

function serializeLayer(layer) {
  normalizeLayerClip(layer);
  const fft = layer.fft ? {
    freq: layer.fft.freq,
    width: layer.fft.width,
    threshold: layer.fft.threshold,
    edge: layer.fft.edge,
    gain: layer.fft.gain
  } : null;
  return {
    effId: layer.effId,
    enabled: layer.enabled,
    start: layer.start,
    end: layer.end,
    values: {...layer.values},
    keyframes: layer.keyframes || {},
    fft
  };
}
function importLayerData(items, fromV1 = false, fallbackFft = null) {
  const layers = [];
  (items || []).forEach(p => {
    const effId = p.effId || p.id;
    if (fromV1 && !p.enabled) return;
    const layer = createLayer(effId, {
      enabled: !!p.enabled,
      start: p.start,
      end: p.end,
      values: p.values || {},
      fft: p.fft || fallbackFft
    });
    if (!layer) return;
    layer.keyframes = p.keyframes || {};
    layers.push(layer);
  });
  return layers;
}
function exportPreset() {
  const data = {
    version: 4,
    bpm: state.bpm,
    comp: {...state.comp},
    audioTrigger: {
      freq: state.audio.freq,
      width: state.audio.freqWidth,
      threshold: state.audio.freqThreshold,
      edge: state.audio.freqEdge,
      gain: state.audio.gain
    },
    midiBindings: state.midi.bindings.map(binding => ({...binding})),
    activeScene: state.activeScene,
    crossfader: state.crossfader,
    scenes: state.scenes.map(scene => ({
      layers: scene.layers.map(serializeLayer)
    })),
    layers: state.layers.map(serializeLayer)
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vjfx-preset-' + Date.now() + '.json';
  a.click();
}
function importPreset(file) {
  const r = new FileReader();
  r.onload = () => {
    try {
      const before = snapshotState();
      const data = JSON.parse(r.result);
      if (data.bpm) { state.bpm = data.bpm; bpmInput.value = data.bpm; }
      if (data.comp) {
        Object.assign(state.comp, data.comp);
        state.comp.duration = clamp(parseFloat(state.comp.duration) || 8, 4, 60);
        state.comp.inPoint = clamp(parseFloat(state.comp.inPoint) || 0, 0, state.comp.duration);
        state.comp.outPoint = clamp(parseFloat(state.comp.outPoint) || state.comp.duration, state.comp.inPoint + 1 / 60, state.comp.duration);
        setTimelineTime(state.play.time);
        syncTimelineControls();
        rebuildTimelineRuler();
      }
      let fallbackFft = null;
      if (data.audioTrigger) {
        state.audio.freq = clamp(parseFloat(data.audioTrigger.freq) || state.audio.freq, 20, 16000);
        state.audio.freqWidth = clamp(parseFloat(data.audioTrigger.width) || state.audio.freqWidth, 10, 2000);
        state.audio.freqThreshold = clamp(parseFloat(data.audioTrigger.threshold) || 0, 0, 1);
        state.audio.freqEdge = data.audioTrigger.edge || 'rise';
        if (data.audioTrigger.gain) state.audio.gain = clamp(parseFloat(data.audioTrigger.gain), 0.1, 8);
        syncGlobalFftUI();
        fallbackFft = {
          freq: state.audio.freq, width: state.audio.freqWidth,
          threshold: state.audio.freqThreshold, edge: state.audio.freqEdge,
          gain: state.audio.gain
        };
      }
      if (Array.isArray(data.midiBindings)) {
        state.midi.bindings = data.midiBindings.map(binding => ({...binding}));
        state.midi.nextBindingId = nextMidiBindingId();
      }
      if (Array.isArray(data.scenes)) {
        state.scenes = [0, 1].map(idx => {
          const scene = data.scenes[idx] || {layers: []};
          return {layers: importLayerData(scene.layers || [], false, fallbackFft)};
        });
        state.activeScene = data.activeScene === 1 ? 1 : 0;
        state.crossfader = clamp(parseFloat(data.crossfader) || 0, 0, 1);
        state.selectedLayerId = state.layers[0]?.lid || null;
      }
      const hasLayerData = !Array.isArray(data.scenes) && (Array.isArray(data.layers) || Array.isArray(data.effects));
      const incoming = data.layers || data.effects || [];
      if (hasLayerData) {
        const fromV1 = !Array.isArray(data.layers);
        state.scenes = [{layers: importLayerData(incoming, fromV1, fallbackFft)}, {layers: []}];
        state.activeScene = 0;
        state.crossfader = 0;
        state.selectedLayerId = state.layers[0]?.lid || null;
      }
      updateSceneControls();
      refreshMidiUI();
      refreshFxUI();
      pushHistory('Import preset', before);
    } catch (e) { alert('プリセット読込失敗: ' + e.message); }
  };
  r.readAsText(file);
}

document.getElementById('presetRand').addEventListener('click', () => {
  runCommand('Random preset', () => {
    state.layers = [];
    // pick 3-7 effects randomly
    const candidates = EFFECTS.filter(def => def.st !== 'mon');
    const n = 3 + Math.floor(Math.random() * 5);
    for (let i = candidates.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
    }
    candidates.slice(0, n).forEach(def => {
      const layer = createLayer(def.id, {enabled: true});
      if (!layer) return;
      layer.values.amount = 0.2 + Math.random() * 0.7;
      layer.values.speed  = Math.random();
      layer.values.mix    = 0.5 + Math.random() * 0.5;
      layer.values.bpmSync = Math.random() < 0.4 ? Math.random() * 0.6 : 0;
      layer.values.audioReactive = Math.random() < 0.4 ? Math.random() * 0.6 : 0;
      if (def.extras) def.extras.forEach(x => {
        if (x.type === 'color') {
          layer.values[x.key] = '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
        } else {
          layer.values[x.key] = x.min + Math.random() * (x.max - x.min);
        }
      });
      randomizeLayerKeyframes(layer, def);
      state.layers.push(layer);
    });
    state.selectedLayerId = state.layers[0]?.lid || null;
    refreshFxUI();
  });
});

const recBtn = document.getElementById('recBtn');
const recInfo = document.getElementById('recInfo');
recBtn.addEventListener('click', () => {
  if (!state.recording) startRec();
  else stopRec();
});
function pickMime() {
  const mimes = [
    'video/mp4;codecs=avc1.42E01E',
    'video/mp4;codecs=avc1',
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm'
  ];
  for (const m of mimes) if (MediaRecorder.isTypeSupported(m)) return m;
  return '';
}
function startRec() {
  try {
    const stream = canvas.captureStream(60);
    const mime = pickMime();
    state.recMime = mime || 'video/webm';
    state.recExt = state.recMime.startsWith('video/mp4') ? 'mp4' : 'webm';
    state.recorder = new MediaRecorder(stream, mime ? {mimeType: mime, videoBitsPerSecond: 8000000} : {});
    state.recChunks = [];
    state.recorder.ondataavailable = e => { if (e.data.size > 0) state.recChunks.push(e.data); };
    state.recorder.onstop = () => {
      const blob = new Blob(state.recChunks, {type: state.recMime});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'vjfx-rec-' + Date.now() + '.' + state.recExt;
      a.click();
    };
    state.recPrevLoop = state.comp.loop;
    state.comp.loop = false;
    setTimelineTime(state.comp.inPoint);
    state.play.playing = true;
    state.play.lastWall = performance.now() / 1000;
    syncTimelineControls();
    state.recorder.start(250);
    state.recording = true;
    state.recStartTime = performance.now();
    recBtn.innerHTML = '<span class="recRing"></span>停止';
    recBtn.classList.add('danger');
    updateRecInfo();
  } catch (e) {
    alert('録画開始失敗: ' + e.message);
  }
}
function stopRec() {
  if (state.recorder && state.recording) {
    state.recorder.stop();
  }
  state.recording = false;
  state.comp.loop = state.recPrevLoop;
  syncTimelineControls();
  recBtn.innerHTML = '● 録画';
  recBtn.classList.remove('danger');
  recInfo.textContent = 'stop';
}
function updateRecInfo() {
  if (!state.recording) return;
  const sec = (performance.now() - state.recStartTime) / 1000;
  const len = Math.max(0.001, state.comp.outPoint - state.comp.inPoint);
  const p = clamp((state.play.time - state.comp.inPoint) / len, 0, 1);
  recInfo.innerHTML = `<span class="recRing"></span>REC ${sec.toFixed(1)}s ${state.recExt.toUpperCase()}<span class="recProgress"><span style="width:${(p * 100).toFixed(1)}%"></span></span>`;
  setTimeout(updateRecInfo, 200);
}

document.addEventListener('keydown', e => {
  if (e.target.matches('input,textarea,select')) return;
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    if (e.shiftKey) redo();
    else undo();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
    e.preventDefault();
    redo();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') {
    copySelectedKey();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') {
    pasteKeyClipboard();
    return;
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    deleteSelectedKey();
    return;
  }
  if (e.code === 'Space') {
    e.preventDefault();
    togglePlayback();
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    state.play.playing = false;
    setTimelineTime(state.play.time - 1 / 60);
    updateTransportButtons();
  }
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    state.play.playing = false;
    setTimelineTime(state.play.time + 1 / 60);
    updateTransportButtons();
  }
  if (e.key === 'Home') {
    e.preventDefault();
    state.play.playing = false;
    setTimelineTime(0);
    updateTransportButtons();
  }
  if (e.key === 'End') {
    e.preventDefault();
    state.play.playing = false;
    setTimelineTime(state.comp.duration);
    updateTransportButtons();
  }
  if (e.key.toLowerCase() === 'i') {
    if (e.shiftKey && state.selectedLayerId) setLayerInAtPlayhead(state.selectedLayerId);
    else setInPoint(state.play.time);
  }
  if (e.key.toLowerCase() === 'o') {
    if (e.shiftKey && state.selectedLayerId) setLayerOutAtPlayhead(state.selectedLayerId);
    else setOutPoint(state.play.time);
  }
  if (e.key === 'f') {
    document.getElementById('fsBtn').click();
  }
  if (e.key === 'h') {
    document.getElementById('hidePanelBtn').click();
  }
  if (e.key === '=' || e.key === '+') {
    e.preventDefault();
    applyZoom(1, state.play.time);
  }
  if (e.key === '-' || e.key === '_') {
    e.preventDefault();
    applyZoom(-1, state.play.time);
  }
  if (e.key === '\\') {
    e.preventDefault();
    state.view.zoom = 1; state.view.scroll = 0;
    repaintTimelineAfterView();
  }
});

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}
function applyPanelSizes() {
  const app = document.getElementById('app');
  app.style.setProperty('--left-w', state.panels.leftW + 'px');
  app.style.setProperty('--right-w', state.panels.rightW + 'px');
  app.style.setProperty('--bottom-h', state.panels.bottomH + 'px');
  resizeCanvas();
}
function setupPanelResize() {
  let drag = null;
  const start = (kind, e) => {
    e.preventDefault();
    drag = {
      kind,
      x: e.clientX,
      y: e.clientY,
      leftW: state.panels.leftW,
      rightW: state.panels.rightW,
      bottomH: state.panels.bottomH
    };
    document.body.classList.add('is-resizing');
    document.body.style.cursor = kind === 'bottom' ? 'row-resize' : 'col-resize';
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', end, {once:true});
  };
  const move = e => {
    if (!drag) return;
    const minCenter = 360;
    if (drag.kind === 'left') {
      const max = Math.max(220, window.innerWidth - state.panels.rightW - minCenter);
      state.panels.leftW = clamp(drag.leftW + e.clientX - drag.x, 220, Math.min(460, max));
    } else if (drag.kind === 'right') {
      const max = Math.max(260, window.innerWidth - state.panels.leftW - minCenter);
      state.panels.rightW = clamp(drag.rightW - (e.clientX - drag.x), 260, Math.min(540, max));
    } else {
      const max = Math.max(130, window.innerHeight - 220);
      state.panels.bottomH = clamp(drag.bottomH - (e.clientY - drag.y), 130, Math.min(420, max));
    }
    applyPanelSizes();
  };
  const end = () => {
    drag = null;
    document.body.classList.remove('is-resizing');
    document.body.style.cursor = '';
    window.removeEventListener('pointermove', move);
  };
  document.getElementById('resizeLeft').addEventListener('pointerdown', e => start('left', e));
  document.getElementById('resizeRight').addEventListener('pointerdown', e => start('right', e));
  document.getElementById('resizeBottom').addEventListener('pointerdown', e => start('bottom', e));
}

function contextTargetFromEvent(e) {
  const layerRow = e.target.closest('.lane-row');
  const libRow = e.target.closest('.lib-row');
  const key = e.target.closest('.key-marker,.graph-point');
  return {
    layerRow,
    libRow,
    key,
    inTimeline: !!e.target.closest('#bottom'),
    inCanvas: !!e.target.closest('#center'),
    inLeft: !!e.target.closest('#left'),
    inRight: !!e.target.closest('#right')
  };
}

function menuItem(label, fn, enabled = true, hint = '') {
  return {label, fn, enabled, hint};
}

function buildContextItems(target) {
  const layer = state.selectedLayerId && layerState(state.selectedLayerId);
  const items = [
    menuItem(state.play.playing ? '停止' : '再生', togglePlayback, true, 'Space'),
    menuItem('先頭へ', () => setTimelineTime(0), true, 'Home'),
    menuItem('現在時刻を In (comp)', () => setInPoint(state.play.time), true, 'I'),
    menuItem('現在時刻を Out (comp)', () => setOutPoint(state.play.time), true, 'O'),
    menuItem('現在時刻を Layer In', () => setLayerInAtPlayhead(state.selectedLayerId), !!layer, 'Shift+I'),
    menuItem('現在時刻を Layer Out', () => setLayerOutAtPlayhead(state.selectedLayerId), !!layer, 'Shift+O'),
    'sep',
    menuItem('メディア読み込み', () => fileInput.click()),
    menuItem('音声読み込み', () => document.getElementById('audioFile').click()),
    menuItem('デモ映像', () => document.getElementById('useDemo').click()),
    'sep',
    menuItem('選択レイヤーにキー追加', () => addKeyframe(state.selectedLayerId, 'amount'), !!layer),
    menuItem('選択レイヤー複製', () => duplicateLayer(state.selectedLayerId), !!layer),
    menuItem(layer?.enabled ? '選択レイヤー OFF' : '選択レイヤー ON', () => toggleLayer(state.selectedLayerId, !layer.enabled), !!layer),
    menuItem('選択レイヤー削除', () => deleteLayer(state.selectedLayerId), !!layer, 'Del'),
    menuItem('Particles 追加', () => addLayer('particles')),
    menuItem('ランダムプリセット', () => document.getElementById('presetRand').click()),
    'sep',
    menuItem('全 FX OFF', () => document.getElementById('fxAllOff').click()),
    menuItem('全展開', () => document.getElementById('fxExpandAll').click()),
    menuItem('全折畳', () => document.getElementById('fxCollapseAll').click()),
    'sep',
    menuItem('MIDI ON', () => document.getElementById('midiEnableBtn').click()),
    menuItem('PNG 保存', () => document.getElementById('snapBtn').click()),
    menuItem('録画 開始/停止', () => document.getElementById('recBtn').click()),
    menuItem('パネル表示切替', () => document.getElementById('hidePanelBtn').click(), true, 'H')
  ];
  if (target?.key) {
    items.splice(10, 0, menuItem('選択キー削除', deleteSelectedKey, true, 'Del'));
  }
  return items;
}

function openContextMenu(x, y, eventTarget) {
  const target = eventTarget ? contextTargetFromEvent(eventTarget) : {};
  const items = buildContextItems(target);
  contextMenu.innerHTML = '';
  items.forEach(item => {
    if (item === 'sep') {
      const sep = document.createElement('div');
      sep.className = 'sep';
      contextMenu.appendChild(sep);
      return;
    }
    const btn = document.createElement('button');
    btn.disabled = !item.enabled;
    btn.innerHTML = `<span>${item.label}</span><span>${item.hint || ''}</span>`;
    btn.addEventListener('click', () => {
      closeContextMenu();
      item.fn();
    });
    contextMenu.appendChild(btn);
  });
  contextMenu.classList.add('open');
  const w = contextMenu.offsetWidth;
  const h = contextMenu.offsetHeight;
  contextMenu.style.left = Math.min(x, window.innerWidth - w - 6) + 'px';
  contextMenu.style.top = Math.min(y, window.innerHeight - h - 6) + 'px';
}

function closeContextMenu() {
  contextMenu.classList.remove('open');
}

document.addEventListener('contextmenu', e => {
  e.preventDefault();
  const row = e.target.closest('.lane-row');
  if (row) {
    const bar = row.querySelector('.lane-bar');
    if (bar?.dataset.lid) state.selectedLayerId = bar.dataset.lid;
  }
  openContextMenu(e.clientX, e.clientY, e);
});
document.addEventListener('pointerdown', e => {
  if (!contextMenu.contains(e.target)) closeContextMenu();
});
window.addEventListener('blur', closeContextMenu);

// ===================================================================
// PREVIEW CONTROLS WIRING
// ===================================================================
function setupPreviewControls() {
  const pcRewind = document.getElementById('pcRewind');
  const pcStepBack = document.getElementById('pcStepBack');
  const pcPlay = document.getElementById('pcPlay');
  const pcStepFwd = document.getElementById('pcStepFwd');
  const pcEnd = document.getElementById('pcEnd');
  const pcLoop = document.getElementById('pcLoop');
  const pcMarkIn = document.getElementById('pcMarkIn');
  const pcMarkOut = document.getElementById('pcMarkOut');
  const pcSeekTrack = document.getElementById('pcSeekTrack');
  pcRewind.addEventListener('click', () => { state.play.playing = false; setTimelineTime(0, {autopan: false}); updateTransportButtons(); });
  pcStepBack.addEventListener('click', () => { state.play.playing = false; setTimelineTime(state.play.time - 1 / 60, {autopan: false}); updateTransportButtons(); });
  pcPlay.addEventListener('click', togglePlayback);
  pcStepFwd.addEventListener('click', () => { state.play.playing = false; setTimelineTime(state.play.time + 1 / 60, {autopan: false}); updateTransportButtons(); });
  pcEnd.addEventListener('click', () => { state.play.playing = false; setTimelineTime(state.comp.duration, {autopan: false}); updateTransportButtons(); });
  pcLoop.addEventListener('click', () => { state.comp.loop = !state.comp.loop; updateTransportButtons(); });
  pcMarkIn.addEventListener('click', () => runCommand('Set In point', () => setInPoint(state.play.time)));
  pcMarkOut.addEventListener('click', () => runCommand('Set Out point', () => setOutPoint(state.play.time)));
  let pcSeekDragging = false;
  const seekFromEvent = e => {
    const rect = pcSeekTrack.getBoundingClientRect();
    const x = clamp(e.clientX - rect.left, 0, rect.width);
    return (x / Math.max(1, rect.width)) * state.comp.duration;
  };
  pcSeekTrack.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    pcSeekDragging = true;
    pcSeekTrack.setPointerCapture(e.pointerId);
    state.play.playing = false;
    setTimelineTime(seekFromEvent(e), {snap: true, autopan: false});
    updateTransportButtons();
  });
  pcSeekTrack.addEventListener('pointermove', e => {
    if (pcSeekDragging) setTimelineTime(seekFromEvent(e), {snap: true, autopan: false});
  });
  pcSeekTrack.addEventListener('pointerup', e => {
    pcSeekDragging = false;
    try { pcSeekTrack.releasePointerCapture(e.pointerId); } catch (err) {}
  });
}
